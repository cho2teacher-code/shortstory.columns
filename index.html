<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>단편소설 읽기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600&family=Noto+Sans+KR:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5f0e8; --sur:#faf7f2; --tx:#2a2118; --tx2:#7a6e62; --tx3:#a89e94;
  --acc:#5c4a32; --bdr:rgba(92,74,50,0.15); --tag:rgba(92,74,50,0.08);
  --serif:"Noto Serif KR",serif; --sans:"Noto Sans KR",sans-serif;
  --rbg:#f0e6d0; --rtx:#3b2f1e; --rfs:18px; --rls:2.0;
}
.dark{--bg:#1a1612;--sur:#221e19;--tx:#e8e0d4;--tx2:#9a8e82;--tx3:#6a5e54;
  --bdr:rgba(232,224,212,0.1);--tag:rgba(232,224,212,0.07);--rbg:#1a1612;--rtx:#e8e0d4;}
.rwhite{--rbg:#fff;--rtx:#1a1a1a;}
.rsepia{--rbg:#f0e6d0;--rtx:#3b2f1e;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:var(--sans);}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;}
.screen.off{display:none;}

/* ── LOGIN ── */
#scr-login{background:var(--bg);align-items:center;justify-content:center;}
.lbox{background:var(--sur);border:1px solid var(--bdr);border-radius:20px;padding:36px 32px;width:300px;display:flex;flex-direction:column;gap:18px;}
.lbox h2{font-family:var(--serif);font-size:20px;text-align:center;}
.lbox p{font-size:13px;color:var(--tx2);text-align:center;line-height:1.6;margin-top:-8px;}
.lg{display:flex;flex-direction:column;gap:5px;}
.lg label{font-size:12px;color:var(--tx2);font-weight:500;}
.lg input{padding:11px 13px;border:1px solid var(--bdr);border-radius:9px;background:var(--bg);color:var(--tx);font-size:15px;font-family:var(--sans);outline:none;}
.lg input:focus{border-color:var(--acc);}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
input[type=number]{-moz-appearance:textfield;}
.lbtn{padding:13px;background:var(--acc);color:#fff;border:none;border-radius:9px;font-size:15px;font-family:var(--sans);font-weight:500;cursor:pointer;}
.lnote{font-size:11px;color:var(--tx3);text-align:center;}

/* ── LIST ── */
#scr-list{background:var(--bg);}
.lhdr{padding:18px 18px 12px;border-bottom:1px solid var(--bdr);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;}
.lhdr h1{font-family:var(--serif);font-size:19px;letter-spacing:-.02em;}
.lhdr p{font-size:12px;color:var(--tx2);margin-top:3px;}
.hright{display:flex;gap:7px;align-items:center;}
.ubadge{font-size:12px;color:var(--tx2);background:var(--tag);padding:5px 10px;border-radius:99px;border:1px solid var(--bdr);}
.tbtn{width:33px;height:33px;border-radius:50%;border:1px solid var(--bdr);background:var(--sur);color:var(--tx2);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.lscroll{flex:1;overflow-y:auto;padding:14px 14px 36px;-webkit-overflow-scrolling:touch;}
.cgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:960px;margin:0 auto;}
.ncard{background:var(--sur);border:1px solid var(--bdr);border-radius:11px;padding:11px;cursor:pointer;display:flex;gap:10px;align-items:flex-start;user-select:none;transition:transform .12s;}
.ncard:active{transform:scale(.97);}
.ncov{width:58px;flex-shrink:0;aspect-ratio:3/4;object-fit:cover;border-radius:4px;background:var(--tag);display:block;}
.ncov-fb{width:58px;flex-shrink:0;aspect-ratio:3/4;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--tag);border-radius:4px;padding:5px;gap:3px;}
.ncov-fb span{font-size:10px;color:var(--tx);text-align:center;line-height:1.3;font-family:var(--serif);font-weight:600;}
.ncov-fb small{font-size:9px;color:var(--tx2);}
.nbody{display:flex;flex-direction:column;gap:4px;flex:1;min-width:0;}
.nnum{font-size:10px;color:var(--tx3);letter-spacing:.04em;}
.ntitle{font-family:var(--serif);font-size:13px;font-weight:600;line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.nauthor{font-size:11px;color:var(--tx2);}
.ntags{display:flex;flex-wrap:wrap;gap:3px;}
.ntag{font-size:10px;color:var(--acc);background:var(--tag);padding:2px 6px;border-radius:99px;}
.noneliner{font-size:11px;color:var(--tx2);line-height:1.5;font-style:italic;border-top:1px solid var(--bdr);padding-top:5px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}

/* ── READER ── */
#scr-reader{background:var(--rbg);transition:background .3s;}
.rtop{height:50px;padding:0 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bdr);background:var(--rbg);flex-shrink:0;gap:8px;z-index:10;}
.backbtn{display:flex;align-items:center;gap:4px;font-size:14px;color:var(--acc);cursor:pointer;padding:8px 4px;white-space:nowrap;user-select:none;}
.rtitle{font-family:var(--serif);font-size:13px;color:var(--rtx);opacity:.6;flex:1;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.rctrls{display:flex;gap:3px;flex-shrink:0;}
.cbtn{width:31px;height:31px;border-radius:7px;border:1px solid var(--bdr);background:transparent;color:var(--rtx);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.cbtn.on{background:var(--acc);color:#fff;border-color:var(--acc);}

/* ── IFRAME 뷰어 ── */
.parea{flex:1;overflow:hidden;position:relative;}

/* 소개 화면 */
.intro{position:absolute;inset:0;background:var(--rbg);z-index:20;overflow-y:auto;padding:28px 28px 40px;display:flex;flex-direction:column;gap:13px;}
.intro.off{display:none;}
.icwrap{display:flex;justify-content:center;}
.icov{width:110px;border-radius:6px;box-shadow:0 4px 16px rgba(0,0,0,.18);}
.ititle{font-family:var(--serif);font-size:23px;font-weight:600;color:var(--rtx);line-height:1.3;}
.iauthor{font-size:13px;color:var(--tx2);margin-top:-5px;}
.idesc{font-size:14px;color:var(--rtx);line-height:1.8;opacity:.85;}
.ioneliner{font-size:13px;color:var(--tx2);font-style:italic;border-left:2px solid var(--acc);padding-left:11px;}
.sbtn{margin-top:6px;padding:14px;background:var(--acc);color:#fff;border:none;border-radius:11px;font-size:15px;font-family:var(--sans);font-weight:500;cursor:pointer;}

/* iframe 컨테이너 */
.reader-frame-wrap{
  position:absolute;inset:0;
  overflow:hidden;
}
#reader-iframe{
  border:none;
  display:block;
}

/* 탭존 */
.tap-prev,.tap-next{position:absolute;top:0;bottom:0;width:20%;z-index:10;cursor:pointer;}
.tap-prev{left:0;}.tap-next{right:0;}

/* 하단 */
.rbot{height:42px;display:flex;align-items:center;justify-content:center;gap:12px;border-top:1px solid var(--bdr);background:var(--rbg);flex-shrink:0;}
.page-info{font-size:13px;color:var(--tx2);font-family:var(--sans);min-width:60px;text-align:center;}
.nav-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--bdr);background:transparent;color:var(--tx);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.nav-btn:active{background:var(--tag);}
.nav-btn:disabled{opacity:.3;cursor:default;}

/* 밑줄/형광펜 메뉴 */
.amenu{position:fixed;background:var(--sur);border:1px solid var(--bdr);border-radius:10px;padding:5px;display:flex;gap:3px;z-index:200;box-shadow:0 4px 16px rgba(0,0,0,.15);}
.amenu.off{display:none;}
.abtn{padding:7px 13px;border:none;border-radius:7px;font-size:13px;font-family:var(--sans);cursor:pointer;font-weight:500;}
.abtn.ul{background:#e8f0fe;color:#1a56db;}
.abtn.hl{background:#fef3c7;color:#92400e;}
.abtn.rm{background:var(--tag);color:var(--tx2);}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="scr-login" class="screen">
  <div class="lbox">
    <h2>단편소설 읽기</h2>
    <p>학번과 이름을 입력하면<br>나만의 독서 기록이 저장돼요.</p>
    <div class="lg"><label>학번</label>
      <input type="number" id="inp-id" placeholder="2101" inputmode="numeric"></div>
    <div class="lg"><label>이름</label>
      <input type="text" id="inp-name" placeholder=""></div>
    <button class="lbtn" id="btn-login">시작하기</button>
    <div class="lnote">입력한 정보는 이 기기에만 저장돼요</div>
  </div>
</div>

<!-- LIST -->
<div id="scr-list" class="screen off">
  <div class="lhdr">
    <div><h1>단편소설 읽기</h1><p>모둠에서 한 작품을 골라 함께 읽어보세요.</p></div>
    <div class="hright">
      <div class="ubadge" id="ubadge"></div>
      <button class="tbtn" id="btn-theme">☀</button>
    </div>
  </div>
  <div class="lscroll"><div class="cgrid" id="cgrid"></div></div>
</div>

<!-- READER -->
<div id="scr-reader" class="screen off rsepia">
  <div class="rtop">
    <div class="backbtn" id="btn-back">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>목록
    </div>
    <div class="rtitle" id="rtitle"></div>
    <div class="rctrls">
      <button class="cbtn on" id="btn-sepia">米</button>
      <button class="cbtn" id="btn-white">白</button>
      <button class="cbtn" id="btn-dark">夜</button>
    </div>
  </div>

  <div class="parea" id="parea">
    <!-- 소개 -->
    <div class="intro" id="intro">
      <div class="icwrap"><img class="icov" id="icov" alt="표지"></div>
      <div class="ititle" id="ititle"></div>
      <div class="iauthor" id="iauthor"></div>
      <div class="ntags" id="itags"></div>
      <div class="idesc" id="idesc"></div>
      <div class="ioneliner" id="ioneliner"></div>
      <button class="sbtn" id="btn-start">소설 읽기 시작 →</button>
    </div>

    <!-- iframe 뷰어 -->
    <div class="reader-frame-wrap" id="frame-wrap">
      <iframe id="reader-iframe" scrolling="no"></iframe>
    </div>
    <div class="tap-prev" id="tap-prev"></div>
    <div class="tap-next" id="tap-next"></div>
  </div>

  <div class="rbot">
    <button class="nav-btn" id="btn-prev">‹</button>
    <div class="page-info" id="page-info">— / —</div>
    <button class="nav-btn" id="btn-next">›</button>
  </div>
</div>

<!-- 밑줄/형광펜 메뉴 -->
<div class="amenu off" id="amenu">
  <button class="abtn ul" id="abtn-ul">밑줄</button>
  <button class="abtn hl" id="abtn-hl">형광펜</button>
  <button class="abtn rm" id="abtn-rm" style="display:none">지우기</button>
</div>

    html: "<p class=\"\">빙하가 반사하는 빛을 바라보면서 너를 생각해.</p><p class=\"cont\">백 일간의 백야.</p><p class=\"cont\">빛은 사람을 취하게 하고 동시에 깨어 있게 해. 나는 여기서 눈을 뜨고도 꿈을 꾸네. 네가 저 빙하 앞에서 서 있는 것 같아. 햇빛 아래에서 푸른 빛을 내던 너의 몸.</p><p class=\"cont\">빛뿐인 고립 속에서 나는 남극 심부의 얼음을 시추하고 그 얼음에 새겨진 육십오만 년 동안의 기억을 알아내려 해. 나에게 이런 일을 할 만한 용기로 힘도 없다는 걸 알아.</p><p class=\"cont\">그런데도 나는 여기에 왔다.</p><p class=\"cont\">남극과 빙하, 백야와 흑야에 대한 이야기를 들으면서 어쩌면 네가 나이로비가 아닌 이곳, 얼음의 땅에 있을지도 모른다는 생각을 했어. 환한 빙하 앞에 우두커니 서 있는 너. 너에 대한 그 환상이 나를 이 얼음투성이 대륙으로 이끌었던 거야.</p><p class=\"cont\">네게 이 노트를 전하고 싶어.</p>\n<hr class=\"sep\">\n<p class=\"\">스물다섯의 젊은 수사가 그 수도원을 세웠을 때, 유럽은 제2차세계대전중이었다. 수도원을 세우고 싶었던 그는 장소를 찾기 위해 프랑스의 시골 마을들을 여행했다. 그곳은 리웅 근처의 작고 황폐한 마을이었다. 젊은 사람들은 마을을 떠났고 남겨진 노인들만이 전쟁 속의 고독을 견디고 있었다. 그가 그 마을에 들렀을 때 한 노부인이 그를 초대해서 말했다.</p><p class=\"cont\">“이 적막한 곳에 와줘서 고마워.”</p><p class=\"cont\">그는 그 말을 잊지 못하고 다시 마을을 찾아와 버려진 집을 사다 수도원을 세웠다. 말이 수도원이었지, 수사는 그 혼자뿐이었고 그는 염소 두 마리를 키우며 연명했다.</p><p class=\"cont\">그는 부드럽고 수줍음이 많은 남자였고 기도와 노동, 휴식으로 이루어진 단순한 삶을 추구했다. 그는 보복하고 질투하며 분노하는 신은 없다고 생각했고 신이 인간에게 줄 수 있는 것은 오로지 사랑뿐이라고 믿었다. 전쟁에서 인간이 같은 인간에게 어떤 짓들을 저질렀는지 알았으면서도 그는 신의 사랑을 믿었다. 그는 2차세계대전중에는 나치를 피해 들어온 유대인들을 수도원에 숨겨줬고, 전쟁이 끝난 후에는 도망쳐 나온 독일인 포로들을 숨겨줬다.</p><p class=\"cont\">그와 함께 살고 싶어했던 이들은 그 낡은 집에 와서 서원을 했다. 그는 개신교 출신의 수사였지만, 수사가 되기를 청하는 이들 중에는 신부를 포함한 가톨릭 신자, 러시아정교 신자, 그리스정교 신자, 성공회 신자도 있었다. 서로 다른 종파 출신의 수사들은 하루 세 번, 러시아정교회에서 부르던 짧고 반복되는 노래로 기도했고, 음악을 전공한 수사가 그런 형식의 노래를 매년 작곡했다. 어떤 노래는 라틴어로, 어떤 노래는 독일어로, 프랑스어로, 러시아어로, 폴란드어로 작곡되었다. 하루 세 번의 공동 기도는 이 노래들과, 십 분 간의 침묵으로 이루어졌다. 아침에는 복음을 한 구절 읽고 묵상했고, 성체를 나눴다. 그들은 어떠한 기부나 선물도 받지 않았고 도자기를 굽고 책을 써서 수도원에 필요한 자금을 충당했다.</p><p class=\"cont\">방문한 사람 중 누구도 거절하지 않는다는 원칙으로, 기도하고 노동하고 싶은 사람들은 얼마든지 그곳에 머물 수 있었다. 특히 여름에는 유럽 각지에서 방문객들이 찾아왔고 어떤 주에는 사천 명이 넘게 모여들기도 했다. 백여 명 되는 수사들만으로 방문객들을 맞는 건 어려운 일이었다. 방문객들이 늘어나자 장기간 체류하는 사람들이 그들을 도와 방문객들을 대접했다. 황량한 마을의 버려진 집에서 시작된 수도원에는 해마다 십만 명이 넘는 방문객들이 찾아오게 되었다.</p><p class=\"cont\">대부분 유럽인들이었던 초기 봉사자들은 짧게는 한 달, 길게는 이 년까지 수도원에 머물렀다. 이후 수도원에서는 거리나 비용 문제로 프랑스까지 오기 힘든 제3세계의 이십대들에게 왕복 비행기 표를 주고 봉사자로 초대하기 시작했다. 아프리카, 아시아, 중남미 등 각 국가마다 두 명씩 초대받았고 이들은 방문객들이 가장 많은 시기인 여름에 수도원에서 세 달간 머물면서 일하고 기도했다.</p>\n<p class=\"\">나는 아직도 내가 왜 그렇게 오랜 시간 그곳에 머물렀는지 모른다.</p><p class=\"cont\">처음에는 일주일만 머물기로 했던 수도원에서 나는 일곱 달을 보냈다. 첫 공동 기도 시간에 나는 그곳을 일주일 만에 떠날 수는 없을 거라는 걸 알았다. 이 주간의 프랑스 여행 중에 일어난 일이었다. 수도원의 도움으로 비자를 받아야 했고, 대학원을 휴학해야 했다.</p><p class=\"cont\">그때 나는 스물일곱 살이었다.</p><p class=\"cont\">나는 수도원에 머무르고 있는 여자아이들 중에서 가장 나이가 많았다. 수도원은 열아홉 살부터 서른 살 미만의 사람들만을 장기 봉사자로 선택했다. 대학을 졸업하고 자기 길을 찾는 스물서너 살 아이들이 개중 가장 많았다. 난 스물일곱이야, 라고 말하면 잠시 침묵이 흘렀다. 나의 부모도, 내가 여행을 떠나기 직전에 아이를 낳은 언니도, 지도교수와 연구실 사람들도 그랬다. 이십대는 어느 때보다 치열해야 할 시기였고, 여기서 치열함이란 죽기 살기로 빠른 시간 내에 안전한 경력을 쌓는 것을 의미했다.</p><p class=\"cont\">“넌 네가 지금 무슨 짓을 하고 있는지 모르지.” 언니가 말했다. “넌 낭비를 하고 있는 거야. 그것도 가장 멍청한 낭비를. 이십대에 네가 하고 싶은 대로 하고 산다면, 결국 우리 엄마 아빠처럼 평생 집도 없이 살게 될 거야. 평생 남의 밑에서 손이 발이 되도록 시키는 일만 해도 자식 결혼하는 데 단 한푼도 보태줄 수 없는 사람이 될 거라고. 네가 대학원 간다고 했을 땐 교수가 되려는 목표라도 있는 줄 알았어. 그것도 아니었다면 왜 네 시간과 돈을 그런 곳에다 투자한 거야? 교수와 동료들이 널 어떻게 보겠니? 너, 세상을 몰라도 너무 모른다. 모아둔 돈이 없으면 학위라도 있어야 하잖아. 그런 식으로 어정쩡하게 세상 살아봐. 넌 정말 아무것도 아닌 사람이 될 거야. 네 속에서 나온 자식 한번 네 품에 품어보지 못하는 인생을 살게 될 거라고.”</p><p class=\"cont\">나는 언니의 말에 동의했다. 언니의 목소리에 실린 분노에 가까운 두려움은 나의 오래된 주인이었으니까. 그 두려움은 어린 시절부터 꾸준히 나를 추동했고 겉보기에는 그다지 위태로워 보이지 않는 어른으로 키워냈다. 두려움은 내게 생긴 대로 살아서는 안 되며 보다 나은 인간으로 변모하기를 멈춰서는 안 된다고 말해왔었다. 달라지지 않는다면, 더 나아지지 않는다면 나는 이 세계에서 소거되어버릴 것이었다.</p><p class=\"cont\">그런데도 나는 그곳에 머물기를 택했다.</p>\n<p class=\"\">남자친구는 침묵했다.</p><p class=\"cont\">마지막 통화에서 내가 수도원에 계속 남을 것이고, 얼마나 오래 머물게 될지 모른다고 말했을 때, 남자친구는 잠깐 한숨을 쉬고 ‘알았다’고 말했다. 그게 전부였다. 미안하다는 말을 하기도 전에 그는 전화를 끊어버렸다.</p><p class=\"cont\">우리는 싸움을 제외한 모든 방법을 동원해서 서로를 견뎠다. 감정을 분출하고 서로에게 욕을 해서 그 반동을 확인하고자 하는 의지도 없었다. 싸움도 일말의 애정이 있을 때나 가능한 일이었다. 나는 그를 미워하지 않았고 그도 나를 미워하지 않았다. 나는 그의 말이나 행동으로 상처받지 않았다. 그도 그러했을 것이다. 우리는 서로에게 나쁘게 대하는 법도 알지 못했다. 하지만 돌이켜 생각해보니 가장 나쁜 건 서로에게 나쁘게 대하지도 못하는 그 무지 안에 있었다.</p><p class=\"cont\">우리는 예의바르게 서로의 눈을 가렸다. 결국 마지막에 와서야 내가 먼저 그의 눈에서 내 손을 뗐고, 우리는 깨끗하게 갈라섰다. 사랑하는 사람들의 마지막은 그렇게 깨끗할 수 없었기에 그 이별은 우리 사이에 어떤 사랑도 남아 있지 않다는 것을 증명했다. 우리는 그저 한 점에서 다른 점한 점으로 이동했을 뿐이었다.</p><p class=\"cont\">마지막 통화를 하고 사 주가 지났을 때 그에게서 문자가 왔다.</p><p class=\"cont\">‘지난 삼 년간 만나줘서 고마웠어. 미안하지만, 이제는 그만 만나자.’</p><p class=\"cont\">그는 언제나 내가 자신을 ‘만나주는 것’이라고 말했었다. 그 말은 나를 당황하게 했고, 그를 조금 경멸하게 했으며, 무엇보다도 그에 대한 편안함을 느끼게 해줬다. 그는 내가 아닌 다른 누구를 만났더라도 그렇게 이야기했을 것이다. 그ᅟᅳᆫ 언제나 자기 자신을 과소평가했고, 겸손을 넘어서 가혹할 정도로 자신에게 인색했다.</p><p class=\"cont\">그에게 나는 스물일곱이 되어 처음 사귄 여자친구였다.</p><p class=\"cont\">“나는 여태껏 여자의 관심을 받아본 적이 없었어. 여자와 사귄다는 건 꿈에서나 가능한 일이었어.”</p><p class=\"cont\">그는 아주 잘생긴 것은 아니어도 한눈에 호감이 가는 사람이었고, 박학다식했고, 피아노 연주를 잘했고, 키스도 잘했다. 그런데도 그는 마음속 깊이, 자신이 사랑받을 수 없다고 믿고 있었다. 그 생각을 직접적인 말로 표현한 적은 없었지만, 그와 만나는 삼 년간 그는 자신의 말과 행동 속에 그런 메시지들을 넣었고, 종국에는 나마저 그의 믿음에 세뇌되었다. 어떻게 그런 일이 가능했던 걸까.</p><p class=\"cont\">한때는 그에게 한지에게 느꼈던 감정보다 더 큰 애정을 느꼈던 적도 있었다. 그런데 어느 순간 그 애정이 사라지고 내 눈앞에 서 있는 그가 커다란 종이 인형처럼 보였다. 그건 사랑이 깨진 것과는 다른 종류의 슬픔이었다.</p><p class=\"cont\">어떻게 그럴 수 있었던 걸까.</p><p class=\"cont\">그에게 하고 싶은 말은 많았지만 나는 하지 않았다. 그저, 그렇게 일방적으로 한국을 떠나와서 미안하다고, 나도 그동안 고마웠다고 문자를 보냈다. 무감한 이별이었지만 이상하게 눈물이 났던 기억이 난다.</p>\n<p class=\"\">내가 케냐에서 출발한 한지와 카로를 마중 나간 건 수도원에 머문 지 네 달이 지났을 때의 일이었다. 운전을 할 줄 알거나 지리에 익은 봉사자가 별로 없어서 나는 테오와 함께 새로 초대된 봉사자들을 마중 나가는 일을 맡게 됐다. 6월이었고, 한창 많은 봉사자들이 리옹 공항에 내릴 시기였다. 나는 멕시코, 마다가스카르, 베트남 출신 봉사자들을 마중 나갔었다. 그건 꽤 멋진 일이었다. 고물차를 몰며 바깥 경치를 구경할 때면 가슴이 탁 트이는 기분이 들었다.</p><p class=\"cont\">입국 게이트에 한지가 나타났을 때, 나는 너무도 쉽게 그애에게 시선을 빼앗겼다. 나는 그전에도 후에도 한지보다 더 검은 흑인을 본 적이 없다. 검은 유화물감으로 캔버스에 그려진 사람처럼, 그애의 피부는 순수한 검은빛이었다. 한지는 한눈에도 190센티미터는 넘어 보이는 장신이었다. 더운 날씨였는데도 긴 면바지에 가죽구두를 신고 있었다. 그애는 우리가 마치 오랜만에 만난 친구라도 되는 것처럼 활짝 웃으며 걸어왔다. 한지 옆에서 걸어온 여자애는 카로라고 했다. 우리 넷은 포옹을 하고 이야기를 시작했다. 한지와 테오, 그리고 카로는 빠른 속도의 프랑스어로 말했다. 나는 카로의 작은 배낭을 들고 앞장서서 걸어나갔다.</p><p class=\"cont\">“프랑스어 못해?” 카로가 물었고 나는 그렇다고 영어로 대답했다. “듣는 것도 못해?” 나는 고개를 끄덕였다. 카로는 뒤돌아서 한지와 테오에게 영어로 말하기 시작했다. “영어로 말하자. 영주는 프랑스어를 못한대.” 테오는 그냥 무의식적으로 프랑스어로 이야기했다면서 나를 생각하지 못해서 미안하다고 말했다.</p><p class=\"cont\">날씨는 맑았고, 고물차는 긁는 소리를 냈고, 나를 제외한 그 셋은 처음부터 뭐가 그리도 잘 맏는지 프랑스어로 즐겁게 떠들어대다가 다시 나를 의식하고 영어로 이야기하다 결국 프랑스어로 돌아갔다. 영어로 말해달라고 부탁하기도 구차하게 느껴져서 나는 조용히 운전만 했다. 소외감을 느꼈고, 그걸 인정하기 싫어서 라디오를 켜고 앞만 보면서 운전했다.</p><p class=\"cont\">수도원에서는 케냐 출신 수사가 우리를 기다리고 있었다. 한지와 카로는 처음 우리를 봤을 때처럼 크게 웃으면서 수사에게 달려가 포옹했다. 셋은 미리 준비된 식탁으로 갔다. 내가 인사하고 자리를 뜨려 하자 한지는 “영주, 고마워”라고 말하고 나를 가만히 쳐다봤다. “다음에 만나.” 한지에게 인사를 하고 밖으로 나오자 소나기가 쏟아졌다.</p><p class=\"cont\">내가 처음 도착했을 때 스무 명이었던 장기 봉사자들은 한지가 도착했을 무렵엔 마흔 명으로 불어났다. 여자아이들이 서른 명이었고, 남자애들이 열 명이었다. 여자아이들은 수도원 내부에 있는 이층짜리 건물을 공동으로 썼다. 한 방에서 네 명씩 잠을 잤고, 이층에는 식당과 거실이 있었다. 남자아이들은 수도원 정문 밖의 오래된 집에서 지냈는데, 그 집 앞에는 커다란 보리수가 있어서 밤이 되면 보리수꽃 내음이 진동했다. 보리수 앞에서 사는 아이들이라고 해서 우리는 그 남자 아이들을을 ‘티욜tilleul 보이즈’라고 불렀다. 가끔 그 집 앞을 지날 때면 티욜 아이들이 발코니에서 시끄럽게 인사를 건넸다.</p><p class=\"cont\">우리들은 매주 토요일 아침에 일주일 치의 일을 배정받았다. 아침, 점심, 저녁 일이 따로 나뉘어 있었는데 시간으로 치면 하루 여섯 시간 정도의 노동이었다. 빅 키친에서 음식 만들기, 방문객용 텐트 세우기, 청소, 설거지, 방문객들 맞이하기, 예배당 정리 등의 일이었고 운전면허가 있는 봉사자들은 시동이 걸리는 것이 신기할 정도로 오래된 트럭이나 승용차를 운전했다.</p><p class=\"cont\">공동 기도는 하루에 세 번 있었다. 수사들이 예배당 가운데로 와서 자리에 앉으면 기도가 시작됐다. 강당같이 허술한 예배당에는 의자도 없었다. 우리 모두는 낡은 카펫이 깔린 바닥에 앉아서 기도했다. 장기 봉사자들은 수사들 뒤쪽 정해진 자리에 모여 앉았다. 한지는 수도원에 도착한 날 저녁 기도 시간에 그곳에 처음 모습을 드러냈다. 그애는 내가 앉은 줄의 오른쪽 맨 끝에 앉았다. 푸른색 라운드넥 티셔츠에 반바지를 입은 한지는 편안해 보였다. 나는 갓 설거지를 끝내고 장화를 벗어둔 채 맨발로 바닥에 앉아서 꾸벅꾸벅 졸았다. 수사들이 모두 자리를 떠나고 난 다음에도 노래를 부르고 싶은 사람들은 남아서 함께 노래를 불렀는데, 그때까지도 나는 고개를 모로 숙이고 졸고 있었다.</p><p class=\"cont\">“영주.”</p><p class=\"cont\">저멀리 앉아 있던 한지가 어느새 내 곁으로 와 있었다. 함께 앉아 있던 다른 봉사자들이 이미 다 자리를 떠난 것이었다. 한지는 내 옆에 놓인 장화를 들었다 놨다 하면서 내 얼굴을 보고 있었다.</p><p class=\"cont\">나는 한지의 얼굴을 그때 처음으로 가까이에서 봤다. 까만 피부는 주름 하나 없이 윤기가 돌았고 커다란 눈은 아이처럼 맑았다. 하얀 치아는 앞니 하나가 반쯤 부러져 있었다. 라운드넥 티셔츠 위로 목이 길게 뻗어 있었다. 그애에게서 여름풀 냄새가 났다.</p><p class=\"cont\">“피곤헤?” 한지가 물었다.</p><p class=\"cont\">“넌 안 피곤해? 아프리카에서부터 왔잖아.”</p><p class=\"cont\">“하나도 안 피곤해. 너, 매점 어디 있는지 알아? 칫솔을 안 가져왔어.”</p><p class=\"cont\">장화에 발을 넣고 예배당을 나왔다. 예배당 맞은편 담벼락 쪽에서 중남미에서 온 장기 봉사자들이 모여서 떠들고 있었다. 한지는 환한 웃음을 지으면서 그애들에게 스페인어로 말을 걸었다. 마치 그애들을 예전부터 알았다는 듯이.</p><p class=\"cont\">“영주, 아까 자동차 안에선 화가 났었어?”</p><p class=\"cont\">“아니.”</p><p class=\"cont\">“그랬던 것 같은데. 우리가 프랑스어로만 이야기해서.”</p><p class=\"cont\">“아니야. 요즘 일이 많아서 피곤했을 뿐이었어. 봐봐. 난 영어로도 말을 잘 못하잖아.”</p><p class=\"cont\">한지는 고개를 흔들면서 말했다.</p><p class=\"cont\">“아니야. 난 널 다 이해해.”</p><p class=\"cont\">한지는 네가 하는 말(what you say)을 다 이해한다는 얘기를 너(you)를 다 이해한다는 뜻의 영어로 말했다.</p><p class=\"cont\">“영주, 그거 알아? 나 외국은 처음이야. 그리고 한국인도 처음 만났어. 나는 나의 첫번째 한국인이야, 영주.”</p><p class=\"cont\">“다른 아시아인도 본 적 없어?”</p><p class=\"cont\">“응. 나이로비에서 지나가는 중국인들을 보긴 했지만 말해본 건 처음이야. 참 신기하고 즐거워, 영주.”</p><p class=\"cont\">매점 앞에는 높은 테이블들이 여럿 있었다. 아이들은 그 앞에 서서 칩을 먹거나 콜라를 마셨다. 매점 앞 공터의 불빛 아래에서 보는 한지의 얼굴은 더 낯설었다. 이렇게 생긴 사람을 만난 건 처음이었다. 한지도 나만큼이나 내 얼굴이 낯설게 느껴졌었겠지.</p><p class=\"cont\">“너는 무슨 일을 해?” 한지가 물었다.</p><p class=\"cont\">“나는 대학원에서 지질학을 공부해.”</p><p class=\"cont\">“지질학?”</p><p class=\"cont\">“지구의 몸을 연구하는 거야. 지구의 나이를 측정하고, 예전에 지구에 살았던 생물들을 알아보고, 화산 폭발이나 지진을 예측하고, 암석이나 빙하도 연구해.”</p><p class=\"cont\">“넌 그중에서 어떤 걸 연구하는데?”</p><p class=\"cont\">“과거의 기후에 대해서 연구해. 최근에는 과거 이천 년간의 동아시아 기후에 대해서 연구했었어.”</p><p class=\"cont\">“어떻게?”</p><p class=\"cont\">“동굴에 있는 석순을 분석해서.”</p><p class=\"cont\">“석순이 뭐야?”</p><p class=\"cont\">“동굴에서 나는 미끌미끌한 뿔.” 나는 아이스크림 콘을 가리키며 말했다.</p><p class=\"cont\">“아, 그거 뭔지 알아.” 한지가 웃었다. “그런데 너도 여기에 초대받아서 왔어?”</p><p class=\"cont\">“아니. 처음에는 그냥 일주일만 머물려고 했었어. 일주일이 이 주일이 되고, 이 주일이 삼 주일이 되고, 나도 내가 얼마나 여기에 있을지 몰라. 학교도 휴학했고, 아무 계획이 없어. 난 스물일곱 살이야. 여기서 이러고 있으면 안 된다는 걸 알아.”</p><p class=\"cont\">“왜?” 한지가 물었다.</p><p class=\"cont\">“도피하는 건 옳은 게 아니니까. 내 삶에 대해서 책임감을 가져야 하니까.”</p><p class=\"cont\">“괜찮아, 영주.” 한지가 말했다.</p><p class=\"cont\">충동적으로 여기에 머물기로 한 것도, 네가 해야 했던 일을 내팽개쳐버린 것도, 수도원 생활도 모두. 괜찮아.</p><p class=\"cont\">그 이야기를 하는 한지의 얼굴이 환하게 빛났다. 어디에서도 본 적 없는 표정이었다. 나를 위로하려는 얼굴도 아니었고, 그저 누구나 할 수 있는 빈말을 할 때의 얼굴도 아니었다. 웃을 때조차도 상대방을 의식하는 어른들의 얼굴도 아니었다. 한지의 얼굴은 그저 자연스럽게 풀려 있었다.</p><p class=\"cont\">대학원이라는 좁은 사회로 진입하면서 나는 사람을 조심하라는 충고를 많이 들었다. 대학원 사람들을 경계하지 않는 내 태도가 굉장히 유아적이라는 것이었다. 특히 여자는 이미지 관리가 중요하다고, 한번 뒷소문이 퍼지기 시작하면 미래가 없다는 이야기를 나는 밥먹듯이 들었다.</p><p class=\"cont\">그리고 나는 꽤나 그 룰을 잘 따라왔다고 믿었다. 수업과 답사에 적극적이었고 뒤풀이에도 참석해서 늦게까지 웃고 떠들었지만 집으로 가는 길엔 아무 이유 없이 울었다.</p><p class=\"cont\">미간에 주름이 잡힌 내 얼굴. 웃고 있는 사진 속 내 모습은 한쪽 입꼬리가 다른 쪽보다 더 많이 올라가서 얼굴 전체가 비대칭으로 보였다. 그저 웃고 있을 뿐인데도 자연스럽기는커녕 찡그린 얼굴처럼 느껴졌다. 그 사실을 의식하고 나서부터는 사람들과 이야기할 때 상대의 눈을 잘 쳐다보지 못했다.</p><p class=\"cont\">그날, 나는 한지의 눈을 피하지 않고 말했다. 그러면서도 내가 한지의 눈을 피하지 않는다는 것을 의식하지도 못했다.</p><p class=\"cont\">한지는 나이로비에서 수의사로 일했다고 말했다. 주로 농장의 소나 염소를 치료하는 일을 했다고. 수의학과를 다닐 때는 고아가 된 야생 코뿔소 두 마리를 아홉 달간 키워서 야생에 되돌려 보내는 프로젝트에 참여하기도 했다고 말했다.</p><p class=\"cont\">“걔네 이름은 하위와 글로리아였어. 우리는 한 번에 이 리터짜리 분유를 타서 먹이고 흙바닥을 파고 그 안에 물을 부어서 진흙 웅덩이를 만들어줬어. 걔들은 가르쳐주지 않아도 어떻게 진흙 웅덩이에서 목욕을 하는지 알더라. 나를 꽤나 잘 따랐어. 그림자처럼 졸졸 따라다니고, 다정하게 쳐다보고, 나를 완전히 믿고 있다는 신호를 보내줬어. 적응 훈련이 다 끝나고 야생에 풀어줄 날이 다가오는데, 차마 걔네 얼굴을 제대로 못 보겠더라. 이렇게나 나를 믿고 따르는데, 배신하는 것 같아서. 버려졌다는 마음에 슬프지 않을까. 한편으로는 걔네가 죽을까봐 두려웠어. 야생 적응 훈련이라고는 했지만 야생에서 자란 애들보다는 뒤떨어질 게 분명했으니까. 우리는 훈련 마지막날에 작은 파티를 열고 서로를 격려했지. 그간 애들을 잘 키웠다면서. 그런 이야기들을 하는데 눈물이 나는 거야.”</p><p class=\"cont\">한지의 눈시울이 붉어졌다.</p><p class=\"cont\">“그애들과 헤어진다는 게 실감이 나지 않았고 못된 짓을 하는 것 같았지. 이게 옳은 일인지 잘 모르겠다는 말까지 나왔어. 그러자 다른 선생님이 말했지. 그건 우리 생각일 뿐이라고, 인간적인 생각으로 걔네의 행복을 막아서는 안 된다는 거야. 사랑과 애착을 구별해야 한다면서, 나를 위해서 야생동물들을 곁에 두려는 생각은 진실한 사랑이 아니라고 했어. 헤어지던 날 걔들을 케이지에 태우고 운전을 해서 얼마쯤 떨어진 곳에 풀어놓았어. 돌아서려는데, 내 쪽을 자꾸만 보더라. 보지 말고 앞으로 가라고 말했어. 그런데도 자꾸만 뒤를 돌아보는 거야. 그애들, 뒤를 돌아보면서도 앞으로 가더라. 천천히 우리를 등지고 그렇게 초원 속으로 가더라.”</p><p class=\"cont\">이야기를 나누는 동안, 매점 문이 닫히고, 몇몇만이 어둠 속에 남아 있었다.</p><p class=\"cont\">“아직도 하위와 글로리아를 생각해. 나는 사람이니까 코뿔소의 마음을 알 길이 없지만, 그애들이 느낄 초원에 대해서 최대한 상상해. 거긴 좁은 훈련장보다 좋은 곳이겠지.”</p><p class=\"cont\">한지는 아픈 동물들을 치료했던 일에 대해서도 이야기했다. 조금의 가망도 없어 보이던 동물이 살아나기도 하고, 쉽게 치료할 수 있을 거라 믿었던 동물의 상태가 갑자기 악화되어 죽기도 한다고 했다. 그럴 때마다 살릴 수 있는 동물을 죽인 건 아닌가 하는 자책감을 느꼈고, 지금도 그렇기는 하지만 최선을 다할 뿐, 그 최선이 항상 좋은 결과를 보장하지는 않는다는 것을 배워나가는 중이라고 했다.</p><p class=\"cont\">“나도 동물을 좋아하지만, 아픈 동물을 보는 게 고통스러울까봐 수의사는 꿈도 못 꿨어. 아픈 동물들이 죽어가는 걸 볼 자신이 없었어.” 내가 말했다.</p><p class=\"cont\">“이해해.” 한지가 말했다.</p><p class=\"cont\">매점 앞 공터에는 우리밖에 남아 있지 않았다.</p>\n<p class=\"\">그 이후로 얼마 동안은 한지와 따로 이야기를 하지 못했다.</p><p class=\"cont\">하루에 세 번 예배당에서 한지를 봤지만 멀찍이 떨어져 앉아서 눈인사를 하는 정도였다. 한지는 남자 봉사자들과 친해져서 언제나 그애들과 붙어다녔다. 안녕, 한지. 인사를 하면 한지의 곁에 늘 붙어 있는 다른 애들이 내게 말을 걸었다.</p><p class=\"cont\">나는 천막이나 침대 시트를 차로 나르거나, 수사들의 가족이 묵는 집을 청소했고, 한지는 주고 빅 키친에서 일했다. 주방에서 매시드포테이토를 만들고 커다란 솥 가득 코코아나 가루 홍차를 타서 배식대로 날랐다. 나는 멀찍이 서서 음식을 나르는 한지를 지켜봤다. 아침 기도 시간 전에 창고 앞에서 그애를 볼 수 있다는 것을 알게 되고는 산책 삼아서 그 근처를 배회했다.</p><p class=\"cont\">그애는 한눈팔지 않고 열심히 일했다. 포대를 나르고, 바닥에 물을 뿌려 솔로 문지르고, 배식대를 정리했다. 그 일을 할 때는 그 일에만 집중하는 것처럼 보였다. 나는 한지가 일하는 모습을 보는 걸 좋아했는데, 이 글을 쓰는 지금에야 드는 생각이지만 한지도 내가 자기 주위를 맴돌고 있다는 것을 알았을 것 같다. 나는 손차양을 만들어 햇빛을 가리고 눈을 가늘게 떠서 그애의 얼굴을 보려고 애썼다. 햇빛 아래서 그애의 검은 피부는 신비로운 금속처럼 푸른빛을 냈다.</p>\n<p class=\"\">일주일에 두 번, 성경 공부 시간이 있었다.</p><p class=\"cont\">장소는 중앙 예배당 옆에 있는 작은 집이었고 그 집은 수사들만 출입할 수 있는 구역에 있었다. 그 집 앞에는 달리아꽃과 라벤더꽃이 빽빽하게 피어 있었다.</p><p class=\"cont\">성경 공부는 성경 텍스트 자체에 대한 내재적 분석과, 그 텍스트가 쓰인 시대 상황에 대한 외재적 분석을 하는 것으로 진행됐다. 성경의 필자들이 살았던 시대의 관념이나 문화가 텍스트 기술에 미친 영향을 설명했고, 그 이후에는 봉사자들이 수사에게 질문을 하며 비판적으로 텍스트를 읽었다.</p><p class=\"cont\">“흥미로운 점은 성경이 죽음 뒤의 삶에 대해서 구체적으로 기술하지 않았다는 겁니다. 하지만 확실한 것은 영혼이 죽지 않고, 지금과는 다른 상태에서 여전히 존재한다는 점이죠. 죽은 뒤의 영혼은 육체라는 제한적 조건에 영향을 받지 않기 때문에 아직 죽지 않은 우리들은 죽음 이후의 삶에 대해서 전혀 모른다고 해도 과언이 아닙니다.” 수사가 말했다.</p><p class=\"cont\">“하지만 성경은 천국과 지옥에 대해서 언급하지 않나요?” 카로가 물었다.</p><p class=\"cont\">“성경은 천국을 언급하지만 구체적으로 묘사하지는 않죠. 정직하게 말해서 그곳은 지금의 우리로서는 인식할 수도 상상할 수도 없는 곳입니다.” 수사가 대답했다.</p><p class=\"cont\">“인간의 인식이 제한적이다라는 것에는 저도 공감해요. 하지만 상상할 수 없다는 것에 대해선 잘 모르겠네요. 인간이 상상할 수 없는 것도 있나요? 상상에 제한이 있나요?” 카로가 다시 물었다.</p><p class=\"cont\">“글쎄요. 하지만 우리가 어떤 상상을 하든 천국은 그 상상을 뛰어넘는 상태일 겁니다. 천국에는 시간도 공간도 존재하지 않을 테니 천국은 영혼의 상태라고 이야기할 수 있죠.” 수사가 말했다.</p><p class=\"cont\">저녁 기도가 시작된다는 종이 울려서 수업은 그쯤에서 마무리되었다. 저녁 기도를 하면서 나는 내가 내세에 대해서 조금도 생각해 보지 않았다는 것을 알았다. 나는 그저 영원이라는 개념에 압도당할 뿐이었다. 그것이 지옥이든 천국이든 영원이라는 개념은 나를 숨막히게 했다.</p><p class=\"cont\">끝이 없다는 것.</p><p class=\"cont\">저녁 기도를 끝내고 숙소에 돌아오면서 카로에게 물었다.</p><p class=\"cont\">“천국이 우리의 상상을 뛰어넘는 영혼의 상태라는 결론에 대해서 어떻게 생각해?”</p><p class=\"cont\">카로는 잠시 침묵하다가 입을 뗐다.</p><p class=\"cont\">“잘 모르겠어.”</p><p class=\"cont\">“너는 천국이 어떤 곳이라고 생각하니?”</p><p class=\"cont\">“잘 모르겠지만 이 세상과는 다른 곳일 거라고 생각해. 사랑하고 사랑받기만 하는 상태. 순진한 생각이라고 비웃어도 좋아.” 카로가 말했다.</p><p class=\"cont\">“죽음 뒤의 삶이 영원하다면, 영원에 비하면 찰나에 불과한 지금의 삶은 왜 존재하는 거지? 천국은 이런 삶에 대한 보상이라는 거야?”</p><p class=\"cont\">“이런 삶?” 카로가 나를 물끄러미 바라봤다.</p><p class=\"cont\">나는 카로에게 더이상 말하지 않았다. 죽고 나면 나라는 존재가 사라지기를 바라왔다고. 아니, 차라리 처음부터 나라는 것이 없었으면 했다고. 그게 삶을 다 겪어내고 천국에 들어가는 것보다 나을 테니까.</p><p class=\"cont\">“영주.” 카로는 내 이름을 부르며 등을 쓰다듬었다.</p><p class=\"cont\">수도원 근처에는 몇 개의 크고 작은 마을들이 있었다. 방문객들 중 몇몇은 그 마을들에 가서 와인을 마시며 웃고 떠들어댔는데, 마을 주민들에게는 참을 수 없는 소음 공해였다. 특히나 야간에 말썽이 많아, 몇몇 봉사자들이 그 마을들로 가는 길목에 서서 밤나들이 가려는 방문객들을 막아서야 했다. 그 일을 ‘나이트 가드’라고 불렀다.</p><p class=\"cont\">한지와 같은 일을 한 건 그때가 처음이었다.</p><p class=\"cont\">나이트 가드는 총 열 명으로, 다섯 개의 구역에 두 명씩 배정되었다. 근무는 아홉시부터 열한시까지였고, 한지와 나는 짝이 되어서 이 주일간 A구역을 맡았다. 수도원 근방의 가장 큰 마을로 향하는 길목이었다. 일곱시에도 해가 완전히지지 않았고 하늘은 오렌지빛과 분홍빛, 먹빛이 어지러이 뒤섞인 호수처럼 보였다. 선선히 부는 바람 사이로 보리수꽃 향이 났다. 한지와 나는 그날 벤치에 앉아서 가족 숙소로 돌아가는 사람들을 쳐다보고 있었다.</p><p class=\"cont\">가족 단위로 온 방문객들의 숙소는 수도원 바깥에 있었다. 그곳에 묵는 사람들은 자전거를 타고 수도원과 숙소를 오갔다. 그들은 해가 지기 전에 숙소로 이동해야 했지만, 몇몇은 늦게까지 기도를 하고 간간이 있는 가로등의 희미한 불빛을 의지해서 숙소까지 돌아갔다.</p><p class=\"cont\">“저쪽으로 걸어가면 뭐가 있을까?” 나는 깜깜한 어둠을 가리키며 물었다.</p><p class=\"cont\">“집들, 해바라기 밭, 라벤더 밭, 목장들, 와인가게들, 식당들, 더 걸어가면 작은 개천이 나온다고도 하고 호수가 나온다고도 해. 중간중간에는 작은 채플들이 있다더라.” 한지가 말했다.</p><p class=\"cont\">“난 다른 것들이 있다고 들었는데.” 내가 말했다.</p><p class=\"cont\">“어떤 것들?”</p><p class=\"cont\">“농장에서 섹스하는 십대들.”</p><p class=\"cont\">한지는 고개를 끄덕이며 웃다가 말했다.</p><p class=\"cont\">“너희 수녀님한테도 그렇게 말하니?”</p><p class=\"cont\">우리는 함께 웃었다.</p><p class=\"cont\">“저기에 뭐가 있는지 가서 확인해보자. 근무가 끝나면 그때 가보는 거지.” 특유의 천진스러운 얼굴로 한지가 말했다.</p><p class=\"cont\">나는 조용히 고개를 저었다. 잘 모르는 타국에서 위험을 감수하면서까지 밤 산책을 하고 싶지는 않다고 했다.</p><p class=\"cont\">아홉시가 넘으면 수도원 밖으로 산책을 나갈 수 없었으므로, 몇몇 방문객들은 자기들은 가족 숙소에 머무는 커플이라고 거짓말을 했다. 우리는 그냥 속아주는 척 그들을 수도원 밖으로 보냈다.</p><p class=\"cont\">그 벤치에 앉아서 한지와 나는 꽤나 많은 이야기를 나눴다. 이야기에 깊이 빠져들어서 수도원 밖으로 빠져나온 방문객들이 한참 멀어지고 나서야 정신을 차렸던 적도 있었다. 내가 무슨 이야기를 해도 내 이야기는 세상으로 퍼질 일이 없었고, 무엇보다도 한지가 그 이야기들로 나를 판단하지 않으리라는 믿음이 컸다. 부끄러운 기억들도, 나를 용서할 수 없었던 일들도 한지 앞에서는 별다른 저항 없이 이야기할 수 있었다. 나는 지금 쓰고 있는 이 글에서도 할 수 없는 말들을 한지에게 했고, 그 이야기는 그애에게만 속해 있다.</p><p class=\"cont\">그런데도 말문이 막히는 순간들이 있었다.</p><p class=\"cont\">한지가 내가 사는 곳은 어떤 곳이냐고 물어볼 때라는지, 왜 그렇게 풍요로운 나라에서 많은 사람들이 자살하는지에 대해서 물어볼 때 그랬다. 나는 그 질문에 제대로 대답하지 못했고, 내가 살고 있는 세상에 대해 분명하게 말하지 못하는 나 자신이 부끄러웠다. 나는 대답 대신 나의 할머니, 엄마, 옆집 아주머니가 살아온 이야기를 했다. 차라리 그쪽이 한지의 질문에 대한 대답으로 더 적합한 것 같아서였다.</p><p class=\"cont\">한지도 한지의 이야기를 해줬다. 나이로비에 살고 있는 삼백만 명의 사람들 중에 이백오십만 명이 빈민가에 산다는 이야기를 하면서, 한지는 그런 극단적인 부조리를 아무렇지 않게 생각하는 부모님을 이해하지 못하며 자랐다고 말했다. 교회에 가서 가족의 평안만을 비는 부모님을 보면서 한지는 그 교회에서 고작 몇 킬로미터 떨어진 거리에서 죽어가는 아이들을 생각했다. 그러면서도 한지는 아버지의 돈으로 좋은 교육을 받았고, 가족에게 헌신적인 어머니의 사랑으로 안정적인 삶을 살아왔다는 사실을 인정했다. 자신이 누려왔던 삶은 부모님의 부로 인한 것이었고, 그 부가 누군가를 착취한 결과는 아닌가 하는 생각이 들 때면 눈을 감았다고 말했다. 그럼에도 자신이 진정으로 믿고 의지하는 건 결국 돈뿐이라고 고백했다.</p><p class=\"cont\">수도원 밖으로 나갔던 커플들도 다 돌아오고, 더이상 웃고 떠드는 사람들의 목소리가 들리지 않았을 때야 우리는 시계를 봤다. 새벽 한시였다. 열한시나 됐을까 하고 확인한 시간이었다.</p>\n<p class=\"\">저녁 기도를 끝내고 한지와 나는 그 전날의 벤치로 갔다.</p><p class=\"cont\">“보여줄 게 있어.”</p><p class=\"cont\">한지는 늘 들고 다니는 크로스백 안에서 손바닥 크기만한 작은 앨범을 꺼냈다. 우리는 가로등 불빛에 그 앨범 속 사진들을 비춰봤다.</p><p class=\"cont\">첫번째는 스무 명 정도 되는 사람들이 부엌에 꼿꼿이 서 있는 사진이었다. 사진의 정 가운데에 노란 꽃무늬가 그려진 초록 드레스를 입은 여자가 흰 담요에 싸인 아이를 안고 있었다. 그녀의 머리에는 드레스와 같은 무늬의 터번이 둘러져 있었다. 한지는 담요에 싸인 아이를 가리키며 말했다.</p><p class=\"cont\">“이게 나야. 이 사람들은 가장 가까운 가족이고.”</p><p class=\"cont\">한지의 가족들은 여자 남자 할 것 없이 모두 어깨가 넓었고 손발이 컸다. 한지의 엄마는 건장한 남자들만큼이나 체구가 좋아 보였다. 그런 엄마의 품에 안긴 한지가 내 눈에는 작은 강아지처럼 보였다.</p><p class=\"cont\">“이 꼬마는 누구야?”</p><p class=\"cont\">나는 엄마의 드레스 자락을 붙잡고 카메라를 응시하는 세 살쯤 돼 보이는 애를 가리키며 물었다.</p><p class=\"cont\">“우리 형이야.”</p><p class=\"cont\">“형제는 형뿐이야?”</p><p class=\"cont\">“아니. 여동생이 하나 있어.”</p><p class=\"cont\">한지는 앨범을 뒤지더니 사진 한 장을 보여줬다. 백일도 채 안 되어 보이는 어린이가 침대에서 자고 있는 사진이었다. 한지는 다시 앨범을 넘겨서 다른 사진을 보여줬다. 아까 그 아이가 분명한, 대여섯 살쯤 된 아이가 자고 있는 사진이었다. 다시, 십대로 자란 그 여자애가 침대에 누워 있는 사진을 봤다. 십대의 그애는 얼굴과 목에 살이 많이 붙어 있었고, 머리카락이 짧았다. 아이는 가제수건이 놓인 베개에 머리를 받치고 입을 살짝 벌리고 있었는데 좋은 꿈을 꾸는 듯 편안해 보였다.</p><p class=\"cont\">“자는 사진 말고 다른 사진은 없어?”</p><p class=\"cont\">한지는 여동생이 누워서 웃고 있는 사진을 보여줬다. 여동생은 얼굴을 찡그리고 웃고 있었다.</p><p class=\"cont\">“레아는 태어나서부터 지금까지 이렇게 누워만 있어.”</p><p class=\"cont\">한지는 앨범을 넘겨서 다른 사진을 보여줬다. 아까의 사진보다 더 살집이 붙어 있는 그애 앞에서 한지와 한지의 엄마, 아빠가 웃고 있었다.</p><p class=\"cont\">“레아의 생일날 찍은 사진이야.”</p><p class=\"cont\">그렇게 말하고 한지는 한참 동안 그애의 얼굴을 들여다봤다. 한지의 얼굴에 따뜻한 빛이 일렁였다.</p><p class=\"cont\">“아름다워. 그렇지?”</p><p class=\"cont\">한지의 그 말에 나는 고개를 끄덕였다.</p><p class=\"cont\">“어릴 때부터 마음이 산란할 때는 레아에게 갔어. 형이 엄마 아빠 몰래 나를 때리고 괴롭힐 때도 잠든 레아의 방에 찾아가서 조용히 울었어. 침대 위에서 자고 있는 레아의 얼굴을 가만히 들여다보면 마음이 잔잔해지는 거야. 레아가 다른 아이들 같았다면 레아랑 무슨 놀이를 하고 놀았을지 상상해 보기도 했어. 레아의 마음은 두 살에 머물러 있어.”</p><p class=\"cont\">나는 그 방에 앉아 레아를 바라보는 어린 한지를 생각했다. 평생 보살펴야 할 가족을 두고 살아가는 삶이 어떤 것일지 나는 몰랐다.</p><p class=\"cont\">한지는 엄마와 아빠, 형, 할머니, 고모들이 번갈아가면서 레아를 돌본다고 말했다. 하지만 언젠가는 결국 자신이 레아를 주도적으로 돌봐야 하리라고, 그래서 어릴 때부터 자신의 삶은 자신만의 삶이 아니라는 걸 알았다고 했다.</p><p class=\"cont\">“결혼을 한다든지 아이를 낳는다든지 그런 일은 생각해본 적이 없어. 난 레아를 책임져야 돼. 돈을 벌어야 하고, 내가 집에 없을 때 레아를 돌봐줄 믿을 만한 사람을 고용해야 하고.”</p><p class=\"cont\">한지의 가족들은 레아의 몸에 욕창이 생기는 것을 막기 위해서 두 시간에 한 번씩 레아의 몸을 반대편으로 뒤집어주고, 레아를 목욕시킬 때는 적어도 두 명이 함께 일을 해야 했다. 시간만 나면 여행을 다니던 한지의 엄마와 아빠는 레아가 태어난 이후로는 가까운 곳으로도 여행을 가지 못했다. 한지는 그것이 무척 괴로운 일이었지만 그 괴로움이 전부는 아니라고 말했다. 가족들 모두 레아를 진심으로 사랑하고 아끼고 있다고.</p><p class=\"cont\">레아는 한지 가족에게 침묵을 선물해줬다. 하루에 적어도 두세 번은 잠든 레아를 소리없이 바라보는 시간이 있었고, 그 아무것도 아닌 시간이 한지의 마음을 견고하게 했다.</p><p class=\"cont\">“울고 떼를 쓸 때도 있어. 아이니까, 그럴 수 있지. 어떤 날에는 몇 시간이고 쉬지 않고 울기도 해. 그럴 때는 정말이지 레아가 밉고, 그 상황이 짜증나고, 때려서라도 레아를 조용히 시키고 싶었어. 나는 나쁜 사람이야.”</p><p class=\"cont\">“한지, 너는 누구보다 좋은 사람이야.”</p><p class=\"cont\">“영주…… 넌 참 단순하구나.”</p><p class=\"cont\">나는 어색해진 분위기를 바꿔보려고 화제를 돌렸다.</p><p class=\"cont\">“이게 네 첫 여행이야?”</p><p class=\"cont\">“처음이야. 난 나이로비 근교에도 놀러가본 적이 별로 없어. 학교 다닐 때 소풍으로 세렝게티 공원에 가본 게 전부야.”</p><p class=\"cont\">“세렝게티?”</p><p class=\"cont\">“지프차를 타고 다니면서 야생동물을 보는 거야.”</p><p class=\"cont\">“멋지다.”</p><p class=\"cont\">“나에겐 세렝게티 공원이 세상의 끝이었어. 세렝게티 공원의 초원은 끝도 보이지 않을 만큼 넓어서 초등학교를 다닐 때는 정말로 그 끝이 없을 줄 알았었어. 소풍을 다녀와서는 엄마 아빠에게 세렝게티에 대해서 신나게 이야기하고, 그것으로도 성에 안 차면 레아의 방으로 달려가서 그애에게 내가 본 풍경들을 과장해서 들려줬어. 그런 얘기를 하고 나면 어쩐지 레아에게 미안한 마음이 들었지. 레아는 평생 한 발자국도 움직이지 못하고 그렇게 누워만 있는데 나만 좋은 구경을 한 것 같아서.”</p><p class=\"cont\">한지는 밖에서 맛있는 것을 먹을 때도, 여자애랑 데이트를 할 때도, 클럽에서 춤을 출 때도, 노래를 부를 때도 레아를 생각한다고 했다. 그럴 때면 마음이 약해졌다가도, 그런 연민 자체가 레아에 대한 오만이라는 생각으로 마음을 다스린다고 했다.</p><p class=\"cont\">“레아는 타인이 아니야. 나는 지금 여기서 너와 이야기를 나누고 있지만, 내 몸의 일부는 나이로비 집에 누워 있어. 내가 어디를 가더라도, 무슨 일을 하고 있더라도 나의 일부는 언제나 나이로비에 있어.”</p><p class=\"cont\">이런 이야기를 하면서도 한지의 시선은 사진 속 레아에게 닿아 있었다. 한지의 얼굴에 일렁이는 따뜻한 빛이 내 창백한 마음 위에 비쳤다.</p>\n<p class=\"\">한지의 손에 깍지를 낀다.</p><p class=\"cont\">한지의 목에 키스한다.</p><p class=\"cont\">나무 그늘 아래 벤치에서 한지와 함께 잠든다.</p><p class=\"cont\">비행기를 타고 한지와 나이로비에 가서 사진 속에서 봤던, 한지의 키가 큰 가족들을 만난다. 한지의 가족들은 나를 환대해주고 용납해준다. 나는 한지와 함께 레아의 방에 가서 인사한다. 한지는 레아를 바라보는 그 따뜻한 눈빛으로 나를 바라본다. 횡단보도가 없다는 나이로비의 도로를 한지와 마구 건너도 버스를 타고 세렝게티 초원으로 간다. 그곳에서 우리는 우연히 한지의 코뿔소들을 만난다. 그들은 건강하고 행복해 보인다. 우리는 그 코뿔소들과 함께 초원에서 해가 지는 모습을 바라본다.</p><p class=\"cont\">한지의 아이를 갖고, 추운 겨울이 없는 나이로비에 머문다. 거기에서 한지와 나는 이곳 수도원의 이야기를 나눈다. 너무 오래된 이야기여서 잘 기억이 나지 않는다면서. 서로가 없었던 예전의 시간은 온전하지 않았다고 말한다.</p><p class=\"cont\">나는 나이로비를 벗어나지 못한다.</p><p class=\"cont\">레아의 기저귀를 갈고, 그애의 머리를 받쳐 수프를 먹인다. 나의 아름다운 아기는 바닥에 앉아서 울고 한지는 집에 들어오지 않는다. 나는 한지를 처음 만났던 이 시절을 그리워한다.</p>\n<p class=\"\">그 이 주일이 지나고, 우리의 나이트 가드도 끝이 났다. 그런데도 한지와 나는 약속이라도 한 것처럼 저녁 기도가 끝나고 그 길목에서 만났다. 예전처럼 긴 이야기를 나누지는 못해도 하루종일 무슨 일을 했는지는 짧게 대화해서 확인했다.</p><p class=\"cont\">가로등 빛이 잘 비치지 않는 곳에 가면 한지를 알아보기가 어려웠다. 한지의 몸은 어둠 속으로 섞여들어갔다. 제대로 보이는 것이라고는 눈밖에 없었는데도, 그 눈을 보면 한지가 무슨 생각을 하는지, 어떤 기분인지 알아차릴 수 있었다.</p><p class=\"cont\">한지의 얼굴은 종종 굳었다.</p><p class=\"cont\">처음에 봤던, 자연스럽게 풀려 있던 그 얼굴이 아니었다. 아주 짧은 시간이기는 했지만 한지는 죽은 사람처럼 보였다. 여기에 존재하지 않는 사람의 얼굴. 그럴 때 나는 그가 나이로비의 레아 곁에 있다고 생각했다.</p><p class=\"cont\">우리는 그전처럼 많은 말들을 쏟아내지는 않았다. 짧으면 몇 초, 길면 몇 분 정도 말없이 가만히 걷기만 했고, 길가로 기어나온 민달팽이를 주워서 풀숲에 던졌다. 나는 그 침묵 속에서 내가 얼마나 그 시간에 집착하고 있는지 알았다. 그 시간은 영원해야 했다. 다른 시간들처럼 함부로 흘러가버려서 과거 속에 폐기되어서는 안 됐다.</p>\n<p class=\"\">우리는 종종 수도원 밖으로 산책을 나갔다.</p><p class=\"cont\">수도원 정문 가까이에는 세상을 떠난 수사들의 묘지가 있었다. 묘지는 곳곳에 심어놓은 꽃 때문에 작은 화원처럼 보였다. 단순한 모양의 나무 십자가에 이름이 적혀 있었고 묘비에 태어난 해와 세상을 떠난 해가 기록되어 있었다. 그곳에는 수도원을 세운 수사의 묘도 있었다. 그는 ‘이 적막한 곳에 와줘서 고마워’라는 노부인의 말 한마디에 연고도 없는 이 작은 마을로 이사를 온 마음 여린 사람이었다. 그의 무덤 앞에서 우리는 약속이나 한 듯 말없이 가만히 서서 그 나무 십자가를 바라보곤 했다.</p><p class=\"cont\">묘지 아래쪽 언덕에는 커다란 보리수 한 그루가 있었다. 바람이 불 때면 보리수의 길고 여린 가지가 그 아래로 걸어가는 우리의 얼굴에 닿았고 보리수꽃 냄새에 들판에서 갓 베어낸 풀냄새가 섞여 코를 간질였다. 언덕 아래에는 말 한 마리가 있었는데, 우리는 그 말에게 피터라는 이름을 지어주고, 식사식산에 배급받은 사과와 비스킷을 줬다. 주머니칼로 사과를 사등분해서 손바닥 위에 올려놓으면 피터가 두터운 혀로 손바닥을 핥으면서 사과를 채갔다. 피터는 멀리 있다가도 “피터”라고 부르면 무거운 발소리를 내며 천천히 우리 쪽으로 걸어왔다. 가까이 온 피터의 충혈된 눈자위에는 파리떼가 잔뜩 꼬여 있었다.</p><p class=\"cont\">피터를 지나 남쪽으로는 넓은 초원이 펼쳐져 있었다. 우리는 초원 사잇길로 걸어가면서 나무 그늘에서 낮잠을 자는 털이 짧은 양들을 구경했다. 초원에서 동쪽으로 이동하면 돌로 지은 작은 성당이 나왔다. 성당 지붕 위로 검은 새들이 날개를 접고 모여 앉아 있었다. 우리는 보통 그 지점에서 수도원으로 돌아왔지만 여유가 되면 더 멀리 걸어나가기도 했다. 거기서부터는 계속 마을이었다. 대부분 오래된 이층집이었지만 담장과 발코니에 색색깔의 꽃이 피어 있어서 화사하고 따뜻한 느낌이 들었다.</p><p class=\"cont\">마을을 지나면 콘크리트 다리 아래로 작은 시내가 보였다. 우리는 신발을 벗고 앉아 그 시냇물에 가만히 발을 담그고 있기를 좋아했다.</p><p class=\"cont\">좋은 일들만 있었던 건 아니다.</p><p class=\"cont\">어떤 사람들은 다리 위에서 “Chinese”라고 나를 부르기도 했고, 보다 과격한 사람은 “Fuck off colored!”라고 소리치고는 마시던 술병을 던지려는 제스처를 취하기도 했다. 그럴 때면 우리는 멀뚱히 다리 위를 쳐다봤다. 조금도 두렵지 않았기 때문이다. 어떤 사람은 프랑스어로 욕을 했는데, 내가 무슨 뜻이냐고 물으면 한지는 웃으면서 별거 아니라고 말했다.</p><p class=\"cont\">나는 그곳에 가만히 앉아서 우리에게 그런 인종차별적인 말을 내뱉고 도망간 사람들에 대해 생각했다. 저들은 어떤 사람들일까. 저들은 다리를 건너서 어디로 가나. 장을 보고 집에 가거나 술집에서 친구들을 만나겠지. 그 사람들도 누군가에게는 소중한 친구이자 가족일 거고, 고객이나 상사 앞에서 모멸감을 느낄 때도 있을 것이다. 외모나 나이, 환경, 혹은 누군가의 편견 때문에 차별받아본 기억이 있을 테고 사랑했던 누군가에게 거절당하기도 했을 것이다.</p><p class=\"cont\">되갚아주고 싶은 건가.</p><p class=\"cont\">아니면 그저 누군가를 자극해서 그 반응을 보고 싶은 건가. 나는 그런 식으로밖에 자신에 대해 안심하지 못하는 그들이 진심으로 가엾게 느껴졌다. 누군가를 조롱하고 차별하면서 기쁨을 느끼는 삶은 얼마나 공허한가.</p><p class=\"cont\">그곳에서의 삶은 빠르게 갔고, 나는 한순간 한순간 지나가는 것이 아쉬워 수시로 시계를 봤다. 몇 마디 나누지 않은 것 같은데도 삼사십 분이 흘러 있었고 어느새 곧 돌아갈 시간이 됐다. 우리는 가져간 타월로 발의 물기를 닦고, 조금 빠르게 걸어서 수도원으로 돌아오곤 했다. 나는 거의 뛰다시피 걸어서 한지를 따라잡으려 했었다.</p>\n<p class=\"\">매주 월요일마다 수도원을 떠나는 봉사자들을 위한 모임이 있었다. 그 모임은 서녀 평이 될까 한 작은 휴게실에서 열렸다. 떠나는 봉사자들 앞에 작은 테이블을 놓고, 몇 개의 양초를 켜고는 그애들의 소회를 듣는 시간이었다. 떠나는 사람들과 친했던 동료들이 함께 지냈던 시간에 대해서 회상하기도 했고, 악기를 다룰 줄 알거나 노래를 잘 부르는 아이들은 작은 공연을 보여주기도 했다. 멕시코에서 온 신디아는 일인극을 했고, 콜롬비아에서 온 구스타고는 마임을 했다. 시간이 남으면 같이 게임을 하기도 했다.</p><p class=\"cont\">그 작은 방에, 서로 다른 국적을 가진 봉사자들 서른 명이 모여 있었다. 영어가 모국어인 봉사자는 한 명도 없었다. 아이들은 영어로 말하고 후렴구처럼 “그런데 내 말을 이해해?”라고 덧붙였다. 영어를 모국어로 둔 사람이 우리를 봤다면, 열 살짜리 아이들 수준의 말하기라고 생각했을지도 모른다. 그런데도 우리는 어떻게든 서로의 말을 이해하려 했다. 낮은 수준의 영어로, 혹은 낮은 수준의 영어를 구사하는 통역을 통해서. 영어로 어눌하게 이야기하는 이 아이들이 모국어로 말한다면 어떤 모습일지 잘 상상되지 않았다.</p><p class=\"cont\">그 모임의 분위기는 오로지 그 모임에 속해 있었다.</p><p class=\"cont\">어느 문화도 그 모임을 주도하지 않았고 그럴 수도 없었다. 아이들은 자발적으로 노래를 부르거나 기타를 치고, 연기와 마임을 했지만 훌륭한 수준이 아니었다. 공통의 화제로 이야기를 나누기도 애매했다. 몇몇을 제외하고 우리는 서로에 대해 완전히 무지했다. 나이가 어떻게 되는지, 어떤 교육을 받았는지, 어디에서 사는지, 정치적인 성향은 어떤지, 왜 여기에 와 있는 것인지 우리는 알지 못했다. 그럼에도 우리는 서로 어눌하게 뱉은 한 문장 한 문장을 이해하려고 애쓰면서 좁은 공간 안에 두 개의 원을 그려 앉았다. 그렇게 원을 그려 안즌ㄴ 것이 모이는 이유의 전부인 것처럼.</p><p class=\"cont\">영어를 전혀 하지 못하는 중남미 아이들은 스페인어와 영어를 할 수 있는 다른 중남미 아이들의 통역을 들으며 모임에 참석했고, 프랑스어만 할 줄 아는 아프리카 아이들도 프랑스어와 영어가 가능한 아이의 통역을 들었다. 누군가 한마디 하면 여기저기서 동시에 통역이 진행됐다. 아주 짧은 영어가 긴 통역으로 이어질 때는 그 언어를 이해하지 못하는 쪽에서 웃음이 터져나왔다.</p><p class=\"cont\">아프리카에서 온 아이들은 어떤 의미에선 모두 한지를 닮아 있었다. 웃음이 많았고, 몸을 자유롭게 움직였다. 조금이라도 웃을 여지가 있으면 놓치지 않고 웃자는 법이라도 있는 것 같았다. 그 아이들 사이에서 웃고 떠드는 한지를 보면서 어쩌면 한지가 나를 지루해하고 불편해할지도 모른다고 느꼈다.</p><p class=\"cont\">한지는 창문 앞에 앉은 아프리카 아이들에게 프랑스어로 통역을 했다. 단순한 사실 전달일 텐데도 재미있는 이야기를 하는 것처럼 다양한 표정을 지으며 중간중간 크게 웃었다. 한지와 이야기하는 사람들은 모두 즐거워 보였다. 평소에는 잘 웃지 않던 애들도 한지 앞에서는 활짝 웃었다. 다른 사람들과 함께 있는 한지는 나와 단둘이 있을 때의 한지와 같은 사람이 아닌 것처럼 보였다.</p><p class=\"cont\">그럴 때, 한지는 그 어느 때보다도 나로부터 멀리 있었다.</p><p class=\"cont\">나는 한지를 알지 못했다. 그애의 세계를, 그애의 손길이 닿을 때마다 조금은 더 따뜻해지고 밝아지는 세계를 알지 못했다.</p>\n<p class=\"\">숙소 거실 소파에 누워서 잡지를 읽는데 카로가 옆으로 와 앉았다. 초콜릿빛 피부가 반짝였고, 작은 얼굴은 누가 정성껏 빚어 놓은 것처럼 아름다웠다. 검은자위가 크고 반짝이는 눈. 카로는 그 눈으로 나를 빤히 쳐다보다 입을 열었다.</p><p class=\"cont\">“어제 한지랑 같이 이야기하는 걸 봤어. 송별 모임 끝나고 마을 쪽으로 가는 길에서 얘기했지?”</p><p class=\"cont\">“그랬어.”</p><p class=\"cont\">“바닥에서 뭔가를 주워서 던지더라. 그게 뭐였어?”</p><p class=\"cont\">“민달팽이였어.”</p><p class=\"cont\">카로는 미간을 찌푸리며 웃었다.</p><p class=\"cont\">“영주. 한지는 정말 괴짜야. 정말 특별해.”</p><p class=\"cont\">카로는 한지에 대해서 얼마나 아는 걸까. 한지는 자신이 아는 모든 사람들에게 내게 한 만큼의 이야기들을 해왔던 걸까. 나는 궁금해졌다.</p><p class=\"cont\">“넌 첫인상이랑 많이 다른 것 같아.” 카로가 말했다.</p><p class=\"cont\">“내 첫인상이 어땠는데?”</p><p class=\"cont\">“수녀인 줄 알았어. 그것도 정말 고지식한 수녀. 농담이 아니야.”</p><p class=\"cont\">카로는 그 말이 내 기분을 상하게 하는 건 아닐지 염려하는 듯 서둘러 말을 덧붙였다.</p><p class=\"cont\">“내 편견이었더라. 너도 한지 못잖은 괴짜던데. 한지에게 네 얘기를 많이 들었어. 네가 여기서 가장 가까운 친구라고 말하더라. 한지를 알아온 지 삼 년이 넘었지만 한지가 누군가와 이렇게 가까이 지내는 건 처음 봤어.”</p><p class=\"cont\">“한지가?”</p><p class=\"cont\">“그래.”</p><p class=\"cont\">“한지는 모두와 다 잘 지내는 것 같던데.”</p><p class=\"cont\">“모두와 잘 지내지만 절대 속을 알 수 없지. 나는 한 번도 한지가 다른 사람에게 싫은 내색 하는 걸 본 적이 없어. 상대에게 상처 주는 게 싫으니까 그런 것 같아. 그런데도 모두가 조금씩은 그애에게 반감이 있어. 한없이 친절하지만 그게 끝이라는 거지. 반감이라기보다는 서운함이라고 해야 맞는 걸까? 가끔씩 보면 사람보다는 동물이랑 더 잘 통하는 것 같기도 하고.”</p><p class=\"cont\">나는 그 말을 하는 카로의 아름다운 얼굴을 가만히 응시했다. 잘 배열된 이목구비와 동그란 머리, 만져보고 싶은 반짝이는 피부. 너처럼 아름다운 아이는 한지와 함께 풀숲으로 민달팽이를 던지지 않을 거라고 생각하면서.</p><p class=\"cont\">“나도 실은 한지를 잘 몰라. 걔가 왜 나랑 가장 친하다고 말했는지도 잘 모르겠어. 알잖아, 여긴 일이 너무 많아서 서로 이야기 나눌 시간도 부족하다는 거.”</p><p class=\"cont\">내가 한지는 조금이라도 덜 좋아했다면 솔직하게 말했을지도 모른다.</p><p class=\"cont\">있지, 카로. 한지와 나는 매일 이야기를 나눠. 일하지 않는 시간이 겹치면 수도원 주위를 산책하고 밤에는 매점 자판기에서 콜라를 뽑아 나눠 마셔. 자정이 넘으면 수돗가 옆 나무 밑에 가만히 앉아 있기도 해. 어떻게 말해야 할까. 이렇게 말해도 된다면…… 한지는 나를 알아. 그리고 나는 한지가 코뿔소의 마음을 상상하듯, 한지의 마음을 상상해. 가끔씩은 한 번도 가본 적 없는 한지의 집 발코니에 앉아 있기도 해.</p><p class=\"cont\">한지는 나와 가깝다고 무람없이 이야기할 수 있었을지 몰라도, 나는 그에 대해 그렇게 이야기하지 못해. 한지에 대해 한마디라도 하면, 모두가 한지에 대한 나의 상상까지 꿰뚫어볼 것만 같아서. 그런 면에서 나는 조금은 미친 사람 같지.</p><p class=\"cont\">“그런데 영주, 넌 몇 살이지?”</p><p class=\"cont\">카로의 질문에 나는 머뭇거렸다.</p>\n<p class=\"\">한지와 우연히 마주치면 배와 등의 피부가 따끔따끔했고 피가 머리 쪽으로 쏠리는 소리가 들렸다. 심장이 크게 뛰기 시작했고, 자꾸 말을 더듬게 됐다. 한지가 멀리서 나를 쳐다보고 있다고 생각하면 종아리부터 목뒤에까지 불이 번지는 것 같았다.</p><p class=\"cont\">그럴 때면 나는 지질시대 구분표를 생각했다.</p><p class=\"cont\">나는 중학교 일학년 때 선물로 받은 지질시대 구분표를 벽에 붙여놓고 처음부터 끝까지 읽어내려가길 좋아했었다. 나중에는 당시 살았던 생물들의 이름을 시대별로 차례대로 외웠고, 고등학교에 입학할 때쯤에는 처음부터 끝까지 암송할 수 있었다. 지금은 없지만 언젠가는 분명 존재했던 것들의 이름이 소중하게 느껴져서였다.</p><p class=\"cont\">원시지구.</p><p class=\"cont\">원시지구에는 어떤 생물도 없었다. 나는 아무것도 그려지지 않은 검은 칠판을 상상했다.</p><p class=\"cont\">시생대.</p><p class=\"cont\">박테리아와 남조류, 고세균류가 등장했다. 백문의 끝으로 그린 작은 점들.</p><p class=\"cont\">원생대.</p><p class=\"cont\">해파리가 나타났다. 몸속이 환히 보이는 투명한 해파리들.</p><p class=\"cont\">캄브리아기.</p><p class=\"cont\">조개와 산호, 삼엽충.</p><p class=\"cont\">오르도비스기.</p><p class=\"cont\">불가사리와 바다전갈로 불리는 생물. 사라져버린 코노돈트.</p><p class=\"cont\">실루리아기.</p><p class=\"cont\">달팽이, 대합, 홍합. 턱이 없는 어류들.</p><p class=\"cont\">나는 기도문을 외우듯이 그것들의 이름을 나열할 수 있었다. 턱이 있는 어류, 페어, 육지 달팽이, 해백합, 파충류 같은 포유류, 소철류, 시조새, 원시 현화식물. 그 이름들을 속으로 외울 때면 바깥 세계에 대한 관심이 사라졌고, 내 안의 생각과 느낌들이 무뎌졌으며, 나라는 존재가 조금은 희미해지는 것 같았다.</p><p class=\"cont\">어디에서든, 어느 시간이든 그런 건 중요하지 않았다.</p><p class=\"cont\">슬플 때, 불안할 때, 화가 날 때, 누군가가 내 마음을 쥐고 흔들 때, 나는 그 이름들을 그저 간절하게 불렀고, 그들은 어느 정도까지는 현실의 고통에서 나를 분리시켜줬다. ‘원시지구’로 시작해서 ‘여러 종류의 발굽이 있는 동물’까지 중얼거리고 나면, 내가 그들의 이름을 부른 것이 아니라, 그들이 나의 이름을 불러준 것 같았다. 그럴 때 나는 혼자가 아니었다.</p><p class=\"cont\">한지는 그걸 알았을까. 내가 그의 옆에서 사라진 생물들의 이름을 조용히 불러왔다는 것을. 그것으로 한지에 대한 내 감정을 억누르려 했다는 것을. 무엇보다도 그애가 내 생각을 읽게 될까 봐 두려웠었다는 것을. 막연하게나마 한지가 내 마음을 알게 된다면 멀리 도망가리라고 생각했었다는 것을.</p><p class=\"cont\">어디에서나 존재감이 없는 나. 많은 사람들 사이에서도 눈에 띄는 한지.</p><p class=\"cont\">자신감이 없고 무슨 말이든 우물쭈물하는 나. 누구와 있어도 자연스럽게 말하는 한지.</p><p class=\"cont\">제대로 웃지도 못해서 입을 가리는 나. 꾸밈없는 표정의 한지.</p><p class=\"cont\">어쩌면 한지는 내가 좋아서가 아니라, 다른 아이들과 잘 섞이지 못하는 나를 그저 돌봐줘야 하는 사람이라고 생각했을지도 몰라, 라고 그때의 나는 생각했다.</p><p class=\"cont\">우리는 대등한 관계의 사람이 아니었다. 그렇기에 연인이 될 수 없었고, 친구로 만나기에도 나는 부족한 사람이었다. 아무도 그렇게 말하지 않았고, 그렇게 판단하지 않았겠지만 나 자신은 그 사실을 잘 알고 있었다. 그런 생각을 할 때면 내가 자신을 ‘만나줬던 것’이라고 말했던 전 남자친구가 생각났다. 어쩌면 그와 나를 삼 년이라는 시간 동안 묶어줬던 건, 스스로를 보잘것없는 사람이라고 믿었던 우리의 공통점 때문이었는지도 모른다. 단지 그의 열등감이 나의 열등감보다 더 컸으므로 나는 그를 경멸하며 나에 대한 경멸을 피해왔을 뿐이었다.</p>\n<p class=\"\">“무슨 생각 해?” 한지가 물었다.</p><p class=\"cont\">“한 달 반이 지나면 네가 나이로비로 돌아간다는 생각을 해.”</p><p class=\"cont\">한지는 침묵했다.</p><p class=\"cont\">“우리가 다시 예전의 생활로 돌아가면 여기에서 지냈던 시간을 얼마나 기억하게 될까?” 내가 물었다.</p><p class=\"cont\">“거의 모든 걸 잊어버리게 되겠지.” 한지가 답했다.</p><p class=\"cont\">“나는 그게 싫어.”</p><p class=\"cont\">“뭐가?”</p><p class=\"cont\">“잊어버리는 것.”</p><p class=\"cont\">나는 가방에서 노트를 꺼내서 펼쳐 보였다.</p><p class=\"cont\">“내 일기야. 여기에 도착해서부터 매일 써왔던 거야. 읽어도 돼.”</p><p class=\"cont\">한지는 내 노트를 한 장 한 장 넘기면서 소리내서 웃었다.</p><p class=\"cont\">“글씨가 무슨 그림 같다. 이거 봐.” 한지는 내가 ‘옷’이라고 쓴 글자를 가리키며 말했다. “사람이 춤추는 모습 같잖아.”</p><p class=\"cont\">한지는 그 문자들을 신기하다는 듯 만져봤다.</p><p class=\"cont\">“아, 이건 나도 읽을 수 있어. 6월 23일. 내가 도착한 날이네. 날도 더운데 오래된 차를 타고 리옹 공항까지 가서 피곤했다. 나이로비에서 온 한지인지 뭔지 하는 남자애는 자꾸 프랑스어로 말하는데 시끄러워서 한 대 때려주고 싶었다. 예배당에서 졸고 있는데 말을 거는 건 또 뭔가. 삼 개월 간 집을 떠나 있는데 칫솔을 안 가져왔다고? 덕분에 매점까지 같이 가줘야 했다.”</p><p class=\"cont\">한지는 한글을 읽을 수 있다는 듯이, 문자 위에 손가락을 갖다 대며 이야기를 지어댔고 우리는 같이 웃었다.</p><p class=\"cont\">“여기에 내 얘기를 쓰기도 했어?” 한지가 물었다.</p><p class=\"cont\">6월 23일 이후, 너는 하루도 빠지지 않고 등장한다.</p><p class=\"cont\">“네 얘기는 별로 없어.” 내가 농담조로 말했다.</p><p class=\"cont\">“난 널 친구라고 생각했는데.” 한지가 웃었다.</p><p class=\"cont\">나는 ‘한지는 빅 키친에서 일하고 있다’라는 문장에서 ‘한지’라는 글자를 손가락으로 가리켰다.</p><p class=\"cont\">“이게 네 이름이야.”</p><p class=\"cont\">한지는 그 글자를 가만히 내려다봤다. 나는 노트에 커다랗게 ‘한지’라고 다시 써서 보여줬다.</p><p class=\"cont\">“아름답다.” 한지가 말했다. “네 이름은 어떻게 생겼어?”</p><p class=\"cont\">나는 ‘한지’라는 글자 옆에 ‘영주’라고 썼다. ‘한지’와 ‘영주’라는 글자는 다정해 보였다.</p><p class=\"cont\">“넌 여기서의 시간을 잊어버릴 수가 없겠다.” 한지가 내 노트를 훑어보면서 말했다. “나는 글쓰기가 어렵던데. 어떻게 이렇게 매일 기록할 수 있어? 나중에 만나게 되면 나에게 지금 시간들에 대해서 이야기해줘야 돼. 난 잘 잊으니까.”</p><p class=\"cont\">“꼭 이야기해줄게.”</p><p class=\"cont\">우리는 다시 만나기 어렵다는 것을 알면서도 늘 그런 식으로 다시 만날 것을 가정했다. 초인종만 누르면 언제고 얼굴을 볼 수 있는 옆집에 사는 것처럼, 저녁을 먹으러 오라고 이야기하면 슬리퍼를 끌고 놀러갈 수 있는 거리에 사는 것처럼 다시 만날 것을 가정하면서도 우리가 평생을 서로 아무 관계 없이 살아가리라는 사실을 피하려고 했다.</p><p class=\"cont\">“영주. 나는 알아. 우리는 다시 만날 거야.” 한지가 말했다.</p><p class=\"cont\">“그래.”</p><p class=\"cont\">나는 내 노트 위에 나란히 놓인 ‘한지’와 ‘영주’를 바라봤다.</p>\n<p class=\"\">‘한지’와 ‘영주’는 아직도 내 노트 위에 있다.</p><p class=\"cont\">그때의 기록을 읽어나가면 우리가 나눴던 웃음과 이야기들, 밤의 품경과 밤공기에 섞인 보리수꽃 향기까지 느낄 수 있다. 내게 웃어주던 한지의 얼굴, 한지가 매점에서 산 밑창이 얇은 슬리퍼, 우리가 나눠 마시던 콜라와 다리 하나가 약해서 자꾸 뒤로 넘어가던 간이 벤치 모두 생생하다. 그런데도 이 이야기들은 모두 없었던 일처럼 빛을 잃는다. 한지와 보낸 시간의 세부를 낱낱이 기억하면서도 실감은 점점 흐려진다.</p>\n<p class=\"\">나는 아직도 왜 한지가 내게 등을 돌렸는지 모른다.</p><p class=\"cont\">그 단절을 이해하지 못한다.</p><p class=\"cont\">시간이 지나도 이해할 수 없는 일은 그렇게 내버려둬야 한다고 생각하면서도 나는 작은 기억 하나도 제대로 잊지 못한다.</p><p class=\"cont\">처음에는 한지가 나를 보지 못한 거라 생각했다. 웃으며 인사하는 나를 한지가 모른 척할 리는 없었으니까. 그러나 그날 몇 번이나 한지는 나를 그냥 지나쳐갔고, 우리가 매일 만나던 그 벤치에도 나타나지 않았다. 어쩌면 한지가 아파서 그런 것일지도 모른다고 생각했다. 그 벤치에서 숙소로 돌아가는 길에 다른 아프리카 아이들과 어울려 웃고 있는 한지를 보기 전까지는. 나는 다시 손을 들어 인사를 했고, 한지는 고개를 돌렸다.</p><p class=\"cont\">그건, 한지가 나이로비에 가기 이 주 전, 9월 12일의 일이었다.</p><p class=\"cont\">‘한지는 고개를 돌렸다’고 나는 썼다.</p><p class=\"cont\">한지가 내게서 고개를 돌리기 전날에도 우리는 그 벤치에서 만나 이야기를 나눴다. 다툼도 없었고, 서로의 마음을 상하게 할만한 일도 없었다. 우리는 그저 평소처럼 그날 무슨 일을 했는지 이야기했다. 일주일간 머물렀던 방문객들이 빠져나간 날이어서 도미토리 숙소를 청소한 이야기를 했던 기억이 난다. 매트리스에서 시트를 걷어 한데 모아 세탁실로 나르는 일이 어려웠다는 이야기였다. 한지는 이제 처음 왔을 때처럼 방문객들이 많지 않아서 수도원이 조금은 적적해 보인다는 말을 했었다. 그게 전부였다.</p><p class=\"cont\">어쩌면 내가 기억하지 못하는 부분에서 그가 상심했던 것은 아닐까. 어쩌면 내가 짓궂은 농담을 했는지도 모른다. 하지만 나는 아주 작은 부분에서도 내가 좋아하는 상대에게 상처를 주고 싶지는 않았기에 늘 조심스러웠었다. 나는 기분 내키는 대로 말하면서, 자기가 무슨 말을 하는지도 모르는 그런 어린애가 아니었다. 아무리 나로 인해 상심하거나 불쾌했다고 해도 말로 풀 수는 없었던 걸까. 다시 얼굴을 마주보고 이야기를 나눌 수도 없을 만큼 내가 뭔가 심각한 잘못을 한 걸까. 아니면 누군가 나에 대해 안 좋은 이야기를 했거나 우리 사이를 이간질했나. 만약에 누군가 너를 모함하는 말을 했다면 나는 그 말을 믿지 않았을 테고, 적어도 너에게 확인이라도 했을 텐데.</p><p class=\"cont\">그날도 한지는 “내일 보자”라고 말했었다. 어둠 속에서, 그 다정한 눈으로 나에게 너는 그렇게 이야기했었다.</p><p class=\"cont\">마음에 걸리는 게 없는 건 아니었다. 가끔씩 한지는 내가 ‘단순하다’고 말했었다. 항상 웃으면서 말했지만, 어쩐지 말에 뼈가 있다고 느껴졌던 적이 몇 번 있었다. 한번은 한지가 “넌 참 단순하구나”라고 말하고는 “단순함은 좋은 거니까”라고 변명하듯 덧붙였었다.</p><p class=\"cont\">나는 한지가 말한 나의 그 단순함이 무엇인지 아직도 모른다.</p>\n<p class=\"\">“기억은 재능이야. 넌 그런 재능을 타고났어.”</p><p class=\"cont\">할머니는 어린 내게 그렇게 말했다.</p><p class=\"cont\">“하지만 그건 고통스러운 일이란다. 그러니 너 자신을 조금이라도 무디게 해라. 행복한 기억이라면 더더욱 조심하렴. 행복한 기억은 보물처럼 보이지만 타오르는 숯과 같아. 두 손에 쥐고 있으면 너만 다치니 털어버려라. 얘야, 그건 선물이 아니야.”</p><p class=\"cont\">하지만 나는 기억한다.</p><p class=\"cont\">불교 신자였던 할머니는 사람이 현생에 대한 기억 때문에 윤회한다고 했다. 마음이 기억에 붙어버리면 떼어낼 방법이 없어 몇 번이고 다시 태어나는 법이라고 했다. 그러니 사랑하는 사람이 죽거나 떠나도 너무 마음 아파하지 말라고, 애도는 충분히 하되 그 슬픔에 잡아먹혀버리지 말라고 했다. 안 그러면 자꾸만 다시 세상에 태어나게 될 거라고 했다. 나는 마지막 그 말이 무서웠다.</p><p class=\"cont\">시간은 지나고 사람들은 떠나고 우리는 다시 혼자가 된다.</p><p class=\"cont\">그 사실을 받아들이지 않으면 기억은 현재를 부식시키고 마음을 지치게 해 우리를 늙고 병들게 한다.</p><p class=\"cont\">할머니는 그렇게 말했었다.</p><p class=\"cont\">나는 그 말을 언제나 기억한다.</p>\n<p class=\"\">한지는 대놓고 나를 없는 사람 취급하기 시작했다.</p><p class=\"cont\">내 인사를 받지 않는 건 물론이고, 길에서 마주치면 다른 길로 돌아갔다. 그런 그애의 눈빛에는 일말의 분노도 없었다. 그저 무심했고 희미했고 지쳐 보였다. 나는 그애를 쫓아가거나 이름을 부를 수조차 없었다. 그럴 자신이 없었다.</p><p class=\"cont\">나는 멀리서 쓰레기를 치우는 한지를 바라봤다. 오른손에는 팔꿈치까지 올라오는 장갑을 끼고, 왼손에는 집게를 들고 있었다. 그애는 쓰레기통에서 페트병이나 유리병, 종이 박스를 꺼내서 망태기에 집어넣는 일을 반복했다. 턱밑으로 땀이 떨어졌고, 푸른 티셔츠의 목 언저리와 겨드랑이, 등 쪽이 축축하게 젖어 있었다. 한지는 입을 약간 벌리고 등을 굽힌 채 조용히 그 작업에 집중했다.</p><p class=\"cont\">언젠가는 한지를 잃게 될 거라고 생각했지만 지금은 아니라고 생각했다.</p><p class=\"cont\">한지가 나를 보고 웃을 때, 나를 위해 시간을 내서 같이 산책을 할 때, 나를 가장 가까운 친구라 생각한다고 이야기했을 때 나는 그 모든 것들이 과분하다고만 여겼었다. 하지만 그 모든 것들을 아무런 설명 없이 끝내버리는 일은 부당했다.</p><p class=\"cont\">나는 쓰레기를 치우는 한지에게 다가갔다. 현기증이 났다.</p><p class=\"cont\">“한지.”</p><p class=\"cont\">한지는 나를 물끄러미 쳐다봤다. 어떤 미소도 없는 굳은 얼굴이었다. 그 얼굴을 본 순간 하고 싶었던 이야기가 무엇이었는지 잊어버렸고 말문이 막혔다. 한지의 시선이 잠깐 내 얼굴에 머물렀다 떠났다.</p><p class=\"cont\">한지가 한 손으로 들고 있던 망태기 안에는 페트병이 가득했다. 한눈에도 끈적끈적해 보이는 콜라병에는 파리 몇 마리가 앉아 있었고 어디선가 아이들이 깔깔 웃는 소리가 들렸다. 내가 어물대는 사이 한지는 망태기의 주둥이를 모아서 한 손에 쥐고 그 자리를 떠났다. 한지는 목각 인형처럼 뻣뻣하게 걸어갔다.</p><p class=\"cont\">나는 쓰레기통 앞에 가만히 서서 한지가 조금 전까지 서 있었던 자리를 바라봤다. 한지는 나에게 아무 말도 하지 않았지만 나는 알았다. 한지가 나를 피하는 이유가 무엇이든 그건 중요한 게 아니었다. 한지는 이제 나를 피하고 있고, 내가 그 사실을 받아들이지 않는다면 그건 한지를 괴롭히는 일이 될 것이다.</p><p class=\"cont\">나는 그애를 괴롭히고 싶지 않았다.</p><p class=\"cont\">내가 어떻게 사과를 하든, 어찌된 일이냐고 따져 묻는 그건 모두 잘못된 일이었다.</p><p class=\"cont\">사람들은 떠난다. 할머니는 그렇게 말했었다.</p><p class=\"cont\">그 사실을 있는 그대로 받아들이기만 하면 돼.</p><p class=\"cont\">나는 나에게 속삭였다.</p>\n<p class=\"\">가끔 꿈을 꾼다. 밤에 산책을 하는 꿈이다.</p><p class=\"cont\">원시지구처럼, 세상에는 어떤 생물도 없다. 민달팽이도, 보리수도, 파리도, 파리떼를 달고 있는 피터도, 낮잠을 자는 양도, 한지의 코뿔소들도, 젊은이도, 노파도, 대학원생도, 수사도, 인종차별주의자도, 그들이 쏟아놓는 쓰레기도 없다.</p><p class=\"cont\">나는 그 텅 빈 어둠 속에서 ‘한때 지구는 이렇게 쓸쓸한 곳이었구나’라고 생각한다.</p><p class=\"cont\">지구는 그저 융기하고 침식하며, 열심히 퇴적하고 있었구나.</p><p class=\"cont\">참 열심히, 쓸쓸히도.</p><p class=\"cont\">세상은 잿빛이고 멀리서 화산은 쿵쿵 소리를 낸다. 나는 그쪽으로 걸어간다. 한참을 걸어가다보면 수도원 근처의 채플이 나오고, 가족 숙소가 나오고, 한지와 함께 걸었던 마을이 나온다. 멀리서 냇가에 발을 담그고 있는 한지와 내가 보인다. 세상에는 그 둘밖에 없다. 빨리 다리에서 내려가서 저들에게로 가야 하는데, 나는 다리 아래로 갈 수 있는 길을 찾지 못한다. 아무리 발버둥을 쳐도 다리 아래로 갈 수가 없다.</p><p class=\"cont\">갑자기 장면이 바뀐다.</p><p class=\"cont\">나와 한지는 수돗가 옆 벤치에 앉아 있다. 어둠 속에서 그렇게 가만히 앉아 있다.</p><p class=\"cont\">한지는 이런 이야기를 한다.</p><p class=\"cont\">“우리는 다시 만날 거야. 다시 만나게 되면 내가 잃어버린 기억에 대해서 이야기해 줘. 난 다 잊어버릴 테니까. 너도. 이 시간도.”</p><p class=\"cont\">한지는 그 말을 하면서 슬프게 웃는다.</p><p class=\"cont\">나는 대답하고 싶지만 입이 열리지 않는다. 힘겹게 한지 쪽을 쳐다보면 한지 대신 커다란 망태기 하나가 입을 벌리고 있다. 한지가 집어넣은 페트병으로 가득한 망태기가.</p><p class=\"cont\">나는 다른 사람들에게 내 고통에 대해 시위하고 싶지 않았다.</p><p class=\"cont\">나는 그저 내 몫의 일을 하고, 하루 세 번 밥을 먹고 공동 기도에 참석했다. 한지와 산책을 하던 시간에는 숙소 거실에서 책을 읽거나, 다른 봉사자들과 함께 코코아를 마시면서 이야기했다. 밤에는 카드게임을 하거나 남미 애들과 털실로 팔찌를 만들고 거실 식탁에서 엉터리 탁구를 쳤다. 나는 눈물이 나도록 웃었다. 열두시쯤 방에 들어가면 룸메이트들은 다 자고 있었다. 나는 담요 속으로 기어들어가 소리없이 울다 잤다.</p><p class=\"cont\">카로가 나를 찾아온 건 그런 밤들 중의 하루였다. 그녀는 방문을 열고 내 이름을 조용히 불렀다.</p><p class=\"cont\">“영주.”</p><p class=\"cont\">나는 담요를 머리끝까지 뒤집어쓰고 자는 척했다.</p><p class=\"cont\">“일어나, 영주. 잠깐이면 돼.”</p><p class=\"cont\">나는 눈물로 축축해진 얼굴을 베개에 비비고 일어났다. 우리는 창고 앞으로 걸어가서 바닥에 종이 박스를 깔고 앉았다.</p><p class=\"cont\">“자는 걸 깨워서 미안해. 그런데 이렇게 하지 않고서는 너랑 얘기할 수 없을 것 같았어. 일하는 시간 말고는 계속 거실에서 다른 애들이랑 같이 있더라.”</p><p class=\"cont\">“그랬어.”</p><p class=\"cont\">“네가 나랑 일대일로 말하는 걸 피한다는 느낌을 받았었어.”</p><p class=\"cont\">“피한 적 없어.”</p><p class=\"cont\">“그렇다면 미안. 너도 내가 너에게 무슨 말을 하려고 하는지 알겠지.”</p><p class=\"cont\">“……”</p><p class=\"cont\">“한지에 대해서야. 한지와 무슨 일이 있었던 거니?” 카로의 목소리가 가늘게 떨렸다.</p><p class=\"cont\">카로의 아름다운 얼굴. 너는 아무것도 모른다. 갑자기 아무 잘못도 없는 카로에게 화가 났다.</p><p class=\"cont\">“그걸 왜 네가 묻는 건데?”</p><p class=\"cont\">“그냥 궁금했었어. 왜 매일 붙어 있던 너희가 이제 인사도 안 하는 사이가 됐는지. 애들이 너희 앞에서 말을 안 해서 그렇지 그런 얘기를 많이 해. 한지는 지쳐 보이더라. 이번 화요일에 있었던 아프리카 모임에도 안 나왔고, 숙소에서도 애들이랑 잘 어울리지 않는다고 해.”</p><p class=\"cont\">“그래서?”</p><p class=\"cont\">“네가 왜 한지에게 그렇게 대하는지 모르겠어. 한지는 좋은 애야.”</p><p class=\"cont\">나는 할 말을 잃었다.</p><p class=\"cont\">“네가 한지에게서 무슨 이야기를 들었는지는 모르겠다.” 내가 말했다.</p><p class=\"cont\">“한지는 아무 말도 안 했어.”</p><p class=\"cont\">“그럼 왜 모든 걸 멋대로 추측해서 내가 일방적으로 잘못했다고 단정하고 이 시간에 자는 나를 깨워서 괴롭히는 거니?”</p><p class=\"cont\">나는 내가 나쁘게 말하고 있다는 것을 느꼈다. 카로는 그저 한지가 걱정돼 묻고 있을 뿐인데 나는 감정적으로 반응하고 있었다. 나에게서 분리된 내가 그렇게 감정적으로 말하는 나를 무심하게 바라봤다.</p><p class=\"cont\">“넌 웃고 떠들잖아. 다른 애들이랑 카드게임을 하고 탁구를 치고. 한지가 괴로워하는 동안.” 카로는 조심스럽게 말했지만, 나는 그 말 속에서 나를 단죄하는 카로의 목소리를 들었다.</p><p class=\"cont\">“그래. 그랬어. 그런데 그게 너랑 무슨 상관이야?”</p><p class=\"cont\">나는 짧은 영어로 직설적으로 말했다. 아이가 뱉은 것처럼 유치하고 날카로운 말. 한지가 나를 어떻게 모른 척하는지, 그게 나를 얼마나 고통스럽게 하는지, 하지만 한지에게 왜 내게 그러느냐고 묻지 못하는지에 대해 설명하려고 해도 할 수가 없었다. 머릿속에서 떠다니는 영어 단어들이 질서를 이루지 못하고 엉켜서 뱉어지지 않았다. 카로. 내가 하고 싶은 말은 이런 게 아니었어. 잠시만 내게 시간을 줘봐. 생각을 하고 좋은 단어들을 선별해서 문장을 만들 시간을.</p><p class=\"cont\">카로는 커다란 눈으로 나를 쳐다봤다. 내 직설적인 말은 카로를 상처 입힐 수 없었다. 그 눈빛에 담긴 감정은 실망감이었다. 너는 이것밖에 안 되는 사람이었구나, 라는 눈빛.</p><p class=\"cont\">“난 그저 너희 사이가 걱정돼서 했던 말이었어. 내가 예전에도 너에게 이야기했었지. 한지는 너랑 지냈던 것처럼 누군가와 그렇게 가까이 지내본 적이 없는 애야. 영주, 한지는 좋은 애야. 나는 그애가 드디어 가까운 사람을 만나서 다행이라고 생각했었어. 보이지 않는 벽 같은 게 있는 애였으니까. 여기 와서 그걸 겨우 깨뜨렸다고 생각했는데, 걔는 상처 입은 것처럼 보여.”</p><p class=\"cont\">나는 잠시 침묵하다가 말했다.</p><p class=\"cont\">“한지는 나를 피하고 있어. 말을 걸 수조차 없어.”</p><p class=\"cont\">“싸웠니?”</p><p class=\"cont\">“아니. 나를 피하기 하루 전에도 같이 이야기했었어.”</p><p class=\"cont\">“정말이야?”</p><p class=\"cont\">“그래.”</p><p class=\"cont\">“영주. 난 네가 이해가 안 돼. 그러면 한지에게 가서 따져 물어. 왜 너를 피하냐고. 이야기를 해서 풀어야 돼. 너처럼, 아무 일도 없는 것처럼 그렇게 지내는 건 너에게도 한지에게도 좋지 않아. 마음에 풀지 못하는 일을 두고 여기서 웃으며 지내는 건 널 속이는 일이야.”</p><p class=\"cont\">“난 이제 자러 갈게. 내일은 아침부터 일이야.” 나는 카로의 말을 듣지 못한 것처럼 말했다. 카로, 나는 한지를 괴롭히고 싶지 않아.</p>\n<p class=\"\">그 주에 나는 다이어트 키친에서 일했다. 방문객 중에는 유당이나 글루텐을 소화시키지 못하거나, 콩, 견과류, 고기, 새우, 토마토 같은 음식에 알레르기를 일으키는 사람들이 있었다. 다이어트 키친은 그런 사람들을 위해서 따로 요리를 하는 주방이었다. 그 주방에서 우리는 감자, 당근, 계란을 삶고, 쌀로 밥을 짓고, 쿠스쿠스*를 찌고, 상추를 씻어서 샐러드를 준비했다. 개중에는 치즈를 먹을 수 있는 사람들도 있었으므로, 바구니에 치즈를 담아 내가기도 했다.</p><p class=\"cont\">*couscous, 밀가루를 손으로 비벼서 만든 좁쌀 모양의 알갱이.</p><p class=\"cont\">그날, 치즈가 다 떨어지자 다이어트 키친의 책임자는 나를 빅 키친으로 보냈다. 나는 그곳에서 한지가 일하고 있다는 걸 알았지만 빅 키친은 넓었고, 조리실 뒤편에 있는 냉장창고에 잠깐 들어갔다 나온다 해도 조리실에서 일하는 한지가 나를 볼 수 없을 거라고 생각했다.</p><p class=\"cont\">냉장창고의 불을 켜고 그 안으로 들어가자 한지가 사과 박스를 들고 서 있었다.</p><p class=\"cont\">그애의 얼굴을 잠깐 보고, 아무 말 없이 길을 비켜줬다. 그런데도 한지는 사과 박스를 든 채로 가만히 서서 나를 쳐다만 보았다.</p><p class=\"cont\">낱개로 포장된 크림치즈를 바구니에 넣었다. 바구니에 치즈를 다 넣고 돌아봤을 때도 한지는 그 자리에 그대로 있었다. 냉장창고 천장에 달린 둥근 전등이 깜빡거렸다. 한지는 하려는 말이 있는 것처럼 나를 쳐다보면서도 한마디도 하지 않았다.</p><p class=\"cont\">그애가 나를 피하지 않았다는 것만으로도 나는 안도했고 말을 건네볼 용기를 얻었다.</p><p class=\"cont\">한지가 들고 있는 박스 속의 사과를 내려다보며 이야기했다.</p><p class=\"cont\">“나를 피하지 않아줘서 고마워. 아주 잠깐이면 돼. 여기는 너무 추워서 오래 있을 수도 없잖아. 그러니 들어줘. 내가 없다는 것처럼 나가버리지 마.” 나는 이 말을 끝내고 한지의 얼굴을 봤다.</p><p class=\"cont\">한지는 울고 있었다.</p><p class=\"cont\">“네가 왜 이러는지 묻지 않을게. 알게 된다면 마음은 후련해지겠지만 그게 무슨 소용이겠니. 내가 너에게 잘못한 게 있다면, 용서하고 용서하지 않고는 너의 자유야. 나의 잘못 때문도 아니라면, 너의 사정 때문에 이러는 거라면 그게 무엇이든 나는 이해할 수 있어. 하지만 누군가의 말 때문에 날 오해했다면, 내 진심을 보지 못했다면 그건 정말 안타까운 일일 거야.”</p><p class=\"cont\">나는 추위와 두려움 때문에 덜덜 떨면서 말했다.</p><p class=\"cont\">“네가 나에게 아무리 못되게 해도 난 상관 안 해. 세상 어디에도 널 미워할 수 있는 방법은 없어. 일주일 뒤에 너를 여기서 볼 수 없다고 생각하면 걷다가도 눈물이 나. 이제 더이상 너에게 이렇게 말을 할 수는 없겠지. 한지, 제발 이렇게 내 인생에서 사라지지 마.”</p><p class=\"cont\">나는 울음을 참고 최대한 담담하게 이야기하려고 노력했다.</p><p class=\"cont\">“한지. 더이상 너를 방해하지 않을게. 나이로비에서도 잘 지내. 넌 지난 일들을 잘 잊는다고 했으니 좋은 기억만 남기고 다 잊어. 아니, 좋은 기억도 잊어. 한지 네가 건강하길. 너의 가족도, 레아도.”</p><p class=\"cont\">“한지! 그 안에 한지 있어?”</p><p class=\"cont\">밖에서 누군가가 문을 두드리며 한지를 찾았다.</p><p class=\"cont\">한지는 손등으로 눈물을 닦고 냉장창고 밖으로 나갔다.</p><p class=\"cont\">나도 곧 밖으로 나갔지만, 뼛속까지 스며든 한기가 쉽게 가시지 않았다. 그런데도 이마만은 뜨겁게 끓어오르고 있었다.</p>\n<p class=\"\">나는 침묵 주간을 신청했다.</p><p class=\"cont\">숙소에 있는 모든 짐을 챙겨서 수도원 밖에 있는 침묵의 집으로 갔다. 침묵의 집은 오래된 이층집이었고, 큰 정원이 있었다. 말이 정원이었지 가꾸지 않은 풀들이 우후죽순 솟아 있어서 밤에는 뱀이라도 나올 것처럼 보였다. 침묵의 집에서는 혼자 방을 쓸 수 있었고, 매 끼니가 수도원에서 배달되어 왔다. 우리는 공동 기도 시간마다 삼십 분씩 걸어서 수도원으로 이동했고 침묵 주간 동안 노동에서 면제됐다.</p><p class=\"cont\">노동이 없는 하루는 길고 고통스러웠다. 아무리 마음을 다잡고 책을 읽으려고 해도 눈에 들어오지 않았고, 그간 노동의 피로로 누르고 있던 불안과 망상들이 내 속에서 날뛰기 시작했다. 가장 한심한 생각은 내가 과거에 어떤 행동을 했다면 현재에도 한지와 잘 지낼 수 있었을까 하는 망상이었다.</p><p class=\"cont\">한지가 밤중에 산책을 하자고 했을 때 거절하지 않고 같이 걸었다면 어땠을까. 한지가 내 노트에 자신의 이야기도 있느냐고 물었을 때, 그냥 솔직히, 내가 쓰는 이야기의 대부분은 너에 대한 것이라고 말했더라면 어땠을까. 그애가 살리지 못했던 동물들에 대해서 이야기했을 때, 당황해서 침묵하지 말고 ‘그것 네 탓이 아니야’라고 위로해줬더라면 어땠을까. 민달팽이의 기원 따위를 떠벌릴 시간에, 그애가 나에게 하고 싶었던 말을 할 기회를 줬더라면 어땠을까. 혹시 나의 그 단순함이 그애를 숨막히게 한 건 아니었을까. 어쩌면 내가 너무 자주 그애를 보려 했던 건 아닐까. 그애가 혼자 있고 싶어하는 시간을 내가 독점해서 나에게 질려버린 건 아닐까.</p><p class=\"cont\">침묵은 나의 헐벗은 마음을 정직하게 보게 했다.</p><p class=\"cont\">사랑받고 싶은 마음, 누군가와 깊이 결합하여 분리되고 싶지 않은 마음, 잊고 싶은 마음, 잊고 싶지 않은 마음, 잊히고 싶은 마음, 잊히고 싶지 않은 마음, 온전히 이해받으면서도 해부되고 싶지 않은 마음, 상처받고 싶지 않은 마음, 상처받아도 사랑하고 싶은 마음, 무엇보다도 한지를 보고 싶다는 마음을.</p><p class=\"cont\">나는 냉장창고에서 한지를 본 이후로 한지를 보지 않으려 했다.</p><p class=\"cont\">예배당의 봉사자석에 가서 앉거나 빅 키친 쪽으로 가면 그애를 볼 수 있었지만 의식적으로 나는 그애를 피했다. 이제 일주일도 안 되어서 그애는 나이로비로 돌아갈 것이었고, 차라리 그애가 이미 가버렸다고 생각하는 편이 덜 고통스러울 것이라고 생각했다. 내가 먼저 그애를 보지 않는 편이, 못 보게 되어버리는 편보다는 더 나을 거라고 생각했던 것이다.</p><p class=\"cont\">한지가 생각날 때마다 나는 정원의 풀숲을 걸으며 지질시대 구분표를 암송했다. 하지만 그 암송도 한지에 대한 생각을 멈추게 할 수는 없었다. 그애는 지질시대의 모든 시기마다 숨쉬고 있었다. 지구가 처음 생겨났을 때에도, 지구에 단단한 지표면이 없었을 때에도, 육지 동물들이 나타나지 않았을 때에도, 그애는 그저 거기에 있었다. 내가 기억하는 한 그애는 영원 속에서 살아갈 것이다. 나는 그 사실을 받아들였다.</p><p class=\"cont\">나는 정원 가장자리에 놓인 의자에 앉아 노트에 한지에게 하고 싶은 말을 써내려갔다. 처음에는 한국어로, 그다음에는 영어로 썼다. 철자법이 엉망진창이고 관사가 듬성듬성 빠진 영어로.</p>\n<p class=\"\">한지.</p><p class=\"cont\">나는 지금 침묵의 집에 있어. 시간은 오후 다섯시이고 날씨는 조금 쌀쌀해.</p><p class=\"cont\">오늘 저녁에 너는 다른 아이들과 함께 송별 모임을 할 거야. 거기서 누군가는 기타를 치며 노래할 테고, 또 누군가는 너와 함께 지냈던 시간을 추억하며 이야기하겠지. 너와 카로는 여기에서 지냈던 시간에 대해 이야기하고 모두에게 고맙다고 말할 거야. 나는 거기에 없을 테도 너는 내가 나타나지 않아 안심하겠지.</p><p class=\"cont\">내일 너는 나이로비로 떠날 거고, 저녁 무렵에는 너의 집에서 가족을 만나게 될 거야. 레아는 널 보고 얼마나 기뻐할까. 그런 레아를 만날 너는 얼마나 행복할까. 너는 샤워를 하고 짐을 풀고 가족들과 함께 식사를 하겠지. 핸드폰으로 찍은 사진들을 가족들에게 보여주면서 여기에서는 좋은 일들만 있었다는 듯이 이야기할 거야. 그러면서도 마음속으로는 어디에도 가지 못하는 너희 가족들에게 미안해하겠지. 그래서 넌 가족에게 더 성실해질 테고, 머잖아 다시 동물병원에서 일을 시작하게 될 거야.</p><p class=\"cont\">시간이 지나면 너는 조금 어리둥절해질 거야. 네가 한때 프랑스의 한 시골 마을에서 수도원 생활을 했고, 거기에서 조그마한 한국 여자애에게 네 이야기를 털어놓고 매일 만나 산책을 했다는 사실이 낯설게 느껴지게 될 거야. 그때가 되면 네가 내 인사를 피하고 내게 등을 돌린 이유도 옅어지겠지. 그때 나를 다시 생각한다면, 이미 나는 얼굴도 목소리도 사라진 사람이 되어 있을 거야. 나는 너의 인생에 아주 작은 흔적만을 남긴, 어쩌면 아무런 흔적도 남기지 못한, 너와 무관하게 살아가는 타인이 될 거야.</p><p class=\"cont\">나도 언젠가는 너처럼 이곳을 떠나 내가 살던 곳으로 가게 되겠지. 다시 연구실에 출근을 하고, 암석을 상대하고, 일본과 중국의 동굴들로 출장을 떠날 거야. 나이에 걸맞은 옷과 표정을 걸치고서 누구와도 불화하지 않으려고 애를 쓰면서 아주 가끔씩, 지금의 시간들을 떠올리게 될 거야. 내가 가장 나다울 수 있었던 시간을, 그 시간 속의 너와 나를 기억할 거야.</p><p class=\"cont\">내 적막한 마음에 함께 있어줘서 고마웠어.</p><p class=\"cont\">한지,</p><p class=\"cont\">네가 앞으로 살아갈 시간에 축복이 가득하길.</p><p class=\"cont\">망각의 축복을, 순간순간마다 존재할 수 있는 힘을 낼 수 있기를.</p><p class=\"cont\">영주</p>\n<p class=\"\">나는 그렇게 쓰고, 한국어를 영어로 옮겨 적은 페이지를 찢어서 버렸다. 나는 가방에 노트를 넣고 수도원으로 걸어갔다. 그 노트에는 그곳에서 지낸 일곱 달 동안의 시간이 하루도 빠지지 않고 한국어로 기록되어 있었다.</p>\n<p class=\"\">저녁 기도 시간이었다. 노래와 침묵, 다시 노래가 이어졌고 수사들은 예배당을 빠져나갔다. 한지는 봉사자석에 가만히 앉아서 예배당 기둥에 걸린 이콘을 보고 있었다. 얼마나 그러고 있었을까. 그애는 자리에서 일어나 예배당 앞쪽으로 걸어가더니 벽에 기대 눈을 감았다. 내가 마지막으로 보게 될 한지의 모습이었다. 나는 그애에게 다가갈 수 없었다.</p><p class=\"cont\">사람들은 떠난다.</p><p class=\"cont\">나는 자리에서 일어나서 예배당 밖으로 나갔다. 거기에 카로가 서 있었다.</p><p class=\"cont\">“잘 가, 카로.” 나는 카로의 귀에 대고 속삭였다.</p><p class=\"cont\">“말하지 않아도 돼. 침묵 주간이잖아.” 카로가 말했다.</p><p class=\"cont\">나는 카로에게 쓴 엽서를 건넸다. 세 달간 고마웠고, 말하지 못했지만 너는 참 아름다운 사람이라는 이야기였다. 카로도 내게 엽서를 줬다. 나는 엽서를 가방에 넣고 카로에게 마지막 인사를 했다.</p><p class=\"cont\">침묵의 집으로 가는 길에, 그곳에 음식을 배달하고 나오는 테오를 만났다. 나는 잠시 망설이다가 가방에서 노트를 꺼내서 테오에게 전했다.</p><p class=\"cont\">“이걸 한지에게 전해줘. 이 노트는 한지 거야.”</p><p class=\"cont\">테오는 잠시 망설이다가 노트를 받아들었다.</p><p class=\"cont\">“너는 한지가 나를 왜 피하는지 아니?” 내가 물었다.</p><p class=\"cont\">테오는 고개를 저었다. 그애는 나를 미친 사람을 보듯 바라봤다.</p><p class=\"cont\">“한지를 만나면 전해줄게. 걔는 내일 나이로비로 돌아가.”</p><p class=\"cont\">“알아.”</p><p class=\"cont\">“이따 송별회에는 안 올 거야?”</p><p class=\"cont\">“나는 거기 안 가.”</p><p class=\"cont\">테오는 잠시 망설이다 말했다.</p><p class=\"cont\">“내가 이런 말을 해도 될지 모르겠지만 너희가 끝까지 화해하지 못한 건…… 끔찍한 일이라고 생각해.”</p><p class=\"cont\">테오는 부정적인 감정을 표현할 때는 늘 ‘끔찍하다’라고 이야기했다. 그는 영어를 잘하지 못했고 특히 형용사를 많이 알지 못했다. 맛이 없는 음식도, 비가 많이 오는 날씨도, 자기의 여드름이나 곱슬머리도 그에게는 모두 ‘끔찍한’ 것이었다. 그런데도 그애가 나와 한지의 관계에 대해 ‘끔찍하다’고 표현하자 그 말은 화살이 되어 내 정신을 관통했다.</p><p class=\"cont\">관계가 이런 식으로 끝나버린 건 미화될 수 있는 일이 아니었다.</p><p class=\"cont\">나는 천천히 걸어서 침묵의 집으로 향했다.</p>\n<p class=\"\">한지가 수도원에서 보낼 마지막 밤이었다. 나는 밤을 꼬박 새우고, 어둠 속에서 수도원 쪽으로 걸어갔다. 아침 일곱시 반 비행기였다. 아마 다섯 시에는 떠날 거야, 라던 카로의 말을 기억하고 걸어갔지만, 이미 그애들이 탄 차는 떠나고 없었다. 그때는 몰랐지만, 나는 끝까지 용기를 내지 못했던 것 같다. 어쩔 수 없이 차를 놓쳐버렸어, 라고 말했지만, 그 말이 진실하지 않다는 것을, 깊은 마음은 알았을 것이다.</p>\n<p class=\"\">한지가 수도원을 떠나고 이틀 후에 나는 다시 숙소로 돌아왔다. 침묵의 집에 들어갈 때에는 여름옷 차림이었는데, 일주일 사이에 기온이 뚝 떨어져서 다들 후드티나 카디건을 걸치고 있었다. 제3세계에서 초대받은 봉사자들이 시나브로 모두 제 나라로 돌아가서 콜롬비아와 파라과이에서 온 아이들을 제외하고는 유럽 아이들밖에 남아 있지 않았다. 쉰다섯 명까지 불어났던 봉사자들이 삼 주 만에 열다섯 명으로 줄어든 것이었다. 늘 시끌벅적하던 거실은 황량해졌고, 아이들이 뜨개질을 하던 바닥에는 뜨개바늘과 털실만 굴러다녔다. 몇몇 애들은 이 변화를 받아들이지 못하고 차를 마시다가 훌쩍대기도 했다.</p><p class=\"cont\">그 눈물에는 떠난 이들에 대한 감미로운 애정이 담겨 있었다. 다 큰 성인이 되어서 아무런 조건 없이 누군가를 좋아하고 생활을 함께했다는 행복. 그 지속될 수도, 반복될 수도 없는 시간 속에서 함께 존재했다는 행복. 그 눈물은 고독이 없었던 시간에 대한 애도였다.</p><p class=\"cont\">그리고 노트는 다시 나에게로 왔다.</p><p class=\"cont\">“한지는 이 노트를 받지 않았어. 이건 너에게 중요한 거라고 말하면서.” 테오가 말했다. “일부러 읽어보려 한 건 아니었어. 하지만 노트를 우연히 펼쳐보니 전부 읽을 수 없는 문자로 적여 있더라. 이게 한국의 알파벳이니?”</p><p class=\"cont\">“응.”</p><p class=\"cont\">“한지가 이걸 읽을 수 있었어?”</p><p class=\"cont\">“아니.”</p><p class=\"cont\">테오는 아무 표정도 읽을 수 없는 얼굴로 내게 노트를 건넸다.</p><p class=\"cont\">이틀 후에 테오도 수도원을 떠났다. 나는 아직도 프랑스어 억양이 강했던 그애의 목소리를 기억한다. 테오는 한지와 내가 화해하지 못한 건 끔찍한 일이라고 말했었다. 우리가 서로에게 아주 나쁜 짓을 했다는 듯이. 그 말을 할 때 그애의 얼굴이 어떻게 일그러졌는지 나는 기억한다.</p>\n<p class=\"\">나는 노트를 둥그렇게 말아서 얼음을 캐낸 구멍 안에 넣고 깊이 밀어낸다. 노트는 별다른 저항 없이, 미끄러지듯 얼음 속으로 떨어진다. 그것은 적어도 일만 년간 썩지 않을 것이다. 나는 그 시간 동안 거듭해서 다시 태어나고 싶지 않다. 그 기억들이 나를 떠나 이 얼음에 붙기를.</p><p class=\"cont\">레아의 얼굴.</p><p class=\"cont\">괜찮아, 라는 말.</p><p class=\"cont\">어둠 속에서 형체가 사라지던 몸과 가끔씩 깜빡이던 눈.</p><p class=\"cont\">침묵하던 눈과 입.</p><p class=\"cont\">검고 푸른 피부.</p><p class=\"cont\">내게서 고개를 돌릴 때의 그 자연스럽지 않던 몸짓.</p><p class=\"cont\">끝까지 그를 이해하지 못하는 내 단순함.</p><p class=\"cont\">그 위로 흐르는 시간.</p><p class=\"cont\">단절.</p><p class=\"cont\">그 모든 것들, 얼음 속으로 떨어진다.</p><p class=\"cont\">여기에 머물렀다 떠나간 많은 생명들처럼.</p><p class=\"cont\">로버트 스콧처럼, 코노돈트처럼, 검치고양이처럼, 아르디피테쿠스처럼,</p><p class=\"cont\">적막하고, 또 적막하게.</p>"
  },

// ── STATE ──
let user=null, novel=null, isDark=false;
let totalPages=0, currentPage=0;
let frameReady=false;
let annoTarget=null, annoPending=null;

// ── STORAGE ──
function savePg(nid,p){localStorage.setItem('pg_'+user+'_'+nid,p);}
function loadPg(nid){return parseInt(localStorage.getItem('pg_'+user+'_'+nid)||'0');}
function loadAnnos(){try{return JSON.parse(localStorage.getItem('an_'+user)||'{}');}catch(e){return {};}}
function saveAnnos(a){localStorage.setItem('an_'+user,JSON.stringify(a));}

// ── LOGIN ──
function doLogin(){
  const id=document.getElementById('inp-id').value.trim();
  const nm=document.getElementById('inp-name').value.trim();
  if(!/^\d{4}$/.test(id)){alert('학번 4자리를 입력해 주세요.');return;}
  if(!nm){alert('이름을 입력해 주세요.');return;}
  user=id+'_'+nm;
  document.getElementById('ubadge').textContent=id+' '+nm;
  document.getElementById('scr-login').classList.add('off');
  document.getElementById('scr-list').classList.remove('off');
  buildCards();
}
document.getElementById('btn-login').onclick=doLogin;
document.getElementById('inp-name').onkeydown=e=>{if(e.key==='Enter')doLogin();};

// ── CARDS ──
function buildCards(){
  const grid=document.getElementById('cgrid');
  grid.innerHTML='';
  NOVELS.forEach(n=>{
    const card=document.createElement('div');
    card.className='ncard';
    const k=String(n.id).padStart(2,'0');
    const pg=user?loadPg(n.id):0;
    if(COVERS[k]){
      const img=document.createElement('img');
      img.className='ncov';img.src=COVERS[k];img.alt=n.title;
      img.onerror=function(){this.outerHTML=`<div class="ncov-fb"><span>${n.title}</span><small>${n.author}</small></div>`;}
      card.appendChild(img);
    }else{
      card.innerHTML+=`<div class="ncov-fb"><span>${n.title}</span><small>${n.author}</small></div>`;
    }
    const body=document.createElement('div');body.className='nbody';
    body.innerHTML=`
      <div class="nnum">${String(n.id).padStart(2,'0')}${pg>0?` <span style="color:var(--acc);font-weight:500">${pg+1}p</span>`:''}</div>
      <div class="ntitle">${n.title}</div>
      <div class="nauthor">${n.author}</div>
      <div class="ntags">${n.tags.map(t=>`<span class="ntag">${t}</span>`).join('')}</div>
      <div class="noneliner">${n.oneliner}</div>`;
    card.appendChild(body);
    card.onclick=()=>openNovel(n);
    grid.appendChild(card);
  });
}

// ── THEME / BG ──
document.getElementById('btn-theme').onclick=()=>{
  isDark=!isDark;document.body.classList.toggle('dark',isDark);
  document.getElementById('btn-theme').textContent=isDark?'☾':'☀';
  if(frameReady)sendToFrame({type:'theme',dark:isDark});
};
function setBg(m){
  const rs=document.getElementById('scr-reader');
  rs.classList.remove('rsepia','rwhite');
  document.body.classList.remove('dark');isDark=false;
  document.getElementById('btn-theme').textContent='☀';
  if(m==='sepia')rs.classList.add('rsepia');
  if(m==='white')rs.classList.add('rwhite');
  if(m==='dark'){document.body.classList.add('dark');isDark=true;document.getElementById('btn-theme').textContent='☾';}
  ['btn-sepia','btn-white','btn-dark'].forEach(id=>document.getElementById(id).classList.remove('on'));
  document.getElementById('btn-'+m).classList.add('on');
  if(frameReady)sendToFrame({type:'bg',mode:m});
}
document.getElementById('btn-sepia').onclick=()=>setBg('sepia');
document.getElementById('btn-white').onclick=()=>setBg('white');
document.getElementById('btn-dark').onclick=()=>setBg('dark');

// ── OPEN NOVEL ──
function openNovel(n){
  novel=n;
  document.getElementById('rtitle').textContent=n.title;
  document.getElementById('ititle').textContent=n.title;
  document.getElementById('iauthor').textContent=n.author+' · '+n.pub;
  document.getElementById('itags').innerHTML=n.tags.map(t=>`<span class="ntag">${t}</span>`).join('');
  document.getElementById('idesc').textContent=n.desc;
  document.getElementById('ioneliner').textContent=n.oneliner;
  const k=String(n.id).padStart(2,'0');
  const ci=document.getElementById('icov');
  ci.src=COVERS[k]||'';ci.style.display=COVERS[k]?'':'none';
  document.getElementById('intro').classList.remove('off');
  document.getElementById('scr-list').classList.add('off');
  document.getElementById('scr-reader').classList.remove('off');
  frameReady=false;
  initFrame();
}

// ── IFRAME 초기화 ──
function initFrame(){
  const parea=document.getElementById('parea');
  const W=parea.clientWidth;
  const H=parea.clientHeight;
  const isLand=W>H;
  const cols=isLand?2:1;
  const pageW=W; // 한 페이지 = 전체 너비 (2컬럼이면 각 절반)
  const colW=Math.floor(W/cols);
  const pad=32;

  const iframe=document.getElementById('reader-iframe');
  iframe.style.width=W+'px';
  iframe.style.height=H+'px';
  iframe.style.position='absolute';
  iframe.style.left='0';
  iframe.style.top='0';

  const rs=document.getElementById('scr-reader');
  const bgMode=rs.classList.contains('rwhite')?'white':rs.classList.contains('dark')?'dark':'sepia';
  const bgColors={sepia:'#f0e6d0',white:'#ffffff',dark:'#1a1612'};
  const txColors={sepia:'#3b2f1e',white:'#1a1a1a',dark:'#e8e0d4'};
  const bg=bgColors[bgMode]||bgColors.sepia;
  const tx=txColors[bgMode]||txColors.sepia;
  const sepColor=bgMode==='dark'?'rgba(232,224,212,0.15)':'rgba(92,74,50,0.15)';

  const content = novel.html || '<p style="text-align:center;margin-top:3em;color:#aaa">본문이 준비 중이에요.</p>';

  const iframeDoc=`<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  width:${W}px;
  height:${H}px;
  overflow:hidden;
  background:${bg};
}
.book{
  width:${W}px;
  height:${H}px;
  column-count:${cols};
  column-gap:0;
  column-fill:auto;
  overflow:hidden;
  position:relative;
  /* translateX로 페이지 넘김 */
  will-change:transform;
  transition:transform .3s ease;
}
.inner{
  padding:${pad}px ${pad}px ${pad}px ${pad}px;
  ${cols===2?`padding-right:${pad}px;`:''}
}
${cols===2?`.inner:first-child{border-right:1px solid ${sepColor};}`:''}
p{
  font-family:"Noto Serif KR",serif;
  font-size:18px;
  line-height:2;
  color:${tx};
  word-break:keep-all;
  margin-bottom:0.8em;
  text-indent:1em;
}
p.cont{text-indent:0;}
hr.sep{
  border:none;
  text-align:center;
  margin:1.2em 0;
  color:${tx};
  opacity:.4;
}
hr.sep::after{content:"*";display:block;text-align:center;font-family:"Noto Serif KR",serif;font-size:18px;}
.anno-ul{border-bottom:2px solid #4a7ef5;cursor:pointer;}
.anno-hl{background:#fde68a;border-radius:2px;cursor:pointer;}
</style>
</head>
<body>
<div class="book" id="book">
${content}
</div>
<script>
const book=document.getElementById('book');
const pageW=${pageW};
let totalPages=0,currentPage=0;

function calcPages(){
  // scrollWidth로 전체 너비 → 페이지 수
  // overflow 잠깐 해제해서 측정
  book.style.overflow='auto';
  const sw=book.scrollWidth;
  book.style.overflow='hidden';
  totalPages=Math.max(1,Math.round(sw/pageW));
  return totalPages;
}

function gotoPage(p){
  currentPage=Math.max(0,Math.min(p,totalPages-1));
  book.style.transform='translateX('+(-currentPage*pageW)+'px)';
  window.parent.postMessage({type:'page',current:currentPage,total:totalPages},'*');
}

window.addEventListener('message',e=>{
  const d=e.data;
  if(d.type==='init'){
    // 폰트 로딩 완료 후 페이지 계산
    document.fonts.ready.then(()=>{
      calcPages();
      gotoPage(d.startPage||0);
    });
  }
  if(d.type==='next')gotoPage(currentPage+1);
  if(d.type==='prev')gotoPage(currentPage-1);
  if(d.type==='goto')gotoPage(d.page);
  if(d.type==='bg'){
    const bgs={sepia:'#f0e6d0',white:'#ffffff',dark:'#1a1612'};
    const txs={sepia:'#3b2f1e',white:'#1a1a1a',dark:'#e8e0d4'};
    document.body.style.background=bgs[d.mode]||bgs.sepia;
    document.querySelectorAll('p,hr.sep').forEach(el=>el.style.color=txs[d.mode]||txs.sepia);
  }
});

// 텍스트 선택 → 부모에 알림
document.addEventListener('mouseup',()=>{
  const sel=window.getSelection();
  if(sel&&!sel.isCollapsed&&sel.toString().trim()){
    const r=sel.getRangeAt(0).getBoundingClientRect();
    window.parent.postMessage({type:'sel',x:r.left+r.width/2,y:r.top,hasText:true},'*');
  }
});
document.addEventListener('touchend',()=>{
  setTimeout(()=>{
    const sel=window.getSelection();
    if(sel&&!sel.isCollapsed&&sel.toString().trim()){
      const r=sel.getRangeAt(0).getBoundingClientRect();
      window.parent.postMessage({type:'sel',x:r.left+r.width/2,y:r.top,hasText:true},'*');
    }
  },60);
});
<\/script>
</body>
</html>`;

  iframe.srcdoc=iframeDoc;

  iframe.onload=()=>{
    frameReady=true;
    const startPage=user?loadPg(novel.id):0;
    sendToFrame({type:'init',startPage});
  };
}

function sendToFrame(msg){
  const iframe=document.getElementById('reader-iframe');
  if(iframe.contentWindow)iframe.contentWindow.postMessage(msg,'*');
}

// iframe → 부모 메시지 수신
window.addEventListener('message',e=>{
  const d=e.data;
  if(d.type==='page'){
    totalPages=d.total;
    currentPage=d.current;
    document.getElementById('page-info').textContent=`${currentPage+1} / ${totalPages}`;
    document.getElementById('btn-prev').disabled=currentPage<=0;
    document.getElementById('btn-next').disabled=currentPage>=totalPages-1;
    if(user&&novel)savePg(novel.id,currentPage);
  }
  if(d.type==='sel'&&d.hasText){
    showAmenu(d.x,d.y+document.getElementById('parea').getBoundingClientRect().top);
  }
});

// ── 페이지 넘기기 ──
function nextPage(){sendToFrame({type:'next'});}
function prevPage(){sendToFrame({type:'prev'});}
document.getElementById('btn-next').onclick=nextPage;
document.getElementById('btn-prev').onclick=prevPage;
document.getElementById('tap-next').onclick=nextPage;
document.getElementById('tap-prev').onclick=prevPage;

// ── 소설 시작 ──
document.getElementById('btn-start').onclick=()=>{
  document.getElementById('intro').classList.add('off');
};

// ── BACK ──
document.getElementById('btn-back').onclick=()=>{
  document.getElementById('scr-reader').classList.add('off');
  document.getElementById('scr-list').classList.remove('off');
  document.getElementById('reader-iframe').srcdoc='';
  novel=null;frameReady=false;totalPages=0;currentPage=0;
  buildCards();hideAmenu();
};

// ── RESIZE ──
let resizeT;
window.addEventListener('resize',()=>{
  clearTimeout(resizeT);
  resizeT=setTimeout(()=>{
    if(novel&&!document.getElementById('intro').classList.contains('off')){
      initFrame();
    }
  },300);
});

// ── ANNOTATIONS ──
const amenu=document.getElementById('amenu');
function hideAmenu(){amenu.classList.add('off');annoPending=null;annoTarget=null;}
function showAmenu(x,y){
  amenu.style.left=Math.min(x-70,window.innerWidth-160)+'px';
  amenu.style.top=Math.max(y-52,4)+'px';
  document.getElementById('abtn-rm').style.display='none';
  amenu.classList.remove('off');
}
document.getElementById('abtn-ul').onclick=()=>{sendToFrame({type:'anno',annoType:'ul'});hideAmenu();};
document.getElementById('abtn-hl').onclick=()=>{sendToFrame({type:'anno',annoType:'hl'});hideAmenu();};
document.addEventListener('click',e=>{
  if(!amenu.classList.contains('off')&&!amenu.contains(e.target))hideAmenu();
});
</script>
</body>
</html>
